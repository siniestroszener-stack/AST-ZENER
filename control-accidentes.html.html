<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <title>Control de Accidentes SST</title>
  <script src="https://accounts.google.com/gsi/client"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script>
    /* =====================================================================
       CONFIGURACIÓN — edita estos 4 valores para tu cuenta/planilla/carpeta.
       Este archivo es autocontenido: toda la configuración vive aquí, no
       hay variables de entorno ni backend. Instrucciones completas de cómo
       obtener cada valor están al final de este archivo, en el bloque
       "GUIA_CONFIGURACION" (búscalo con Ctrl+F), y también aparecen dentro
       de la app la primera vez que la abres si falta algún dato.
       ===================================================================== */
    const CONFIG = {
      // Client ID de OAuth 2.0 (tipo "Aplicación web") creado en Google Cloud
      // Console para el proyecto donde habilitaste Sheets API y Drive API.
      CLIENT_ID: '1062246310358-avg5cag54h3lffcpp8f9g9mgrf8a5e3k.apps.googleusercontent.com',

      // ID de la planilla madre. Queda vacío la primera vez — usa el botón
      // "Crear estructura inicial" dentro de la app (aparece automáticamente
      // si esto está vacío) y pega aquí el ID que te muestre al terminar.
      SPREADSHEET_ID: '',

      // ID de la carpeta raíz en Drive. Igual que arriba: se completa con
      // el mismo botón de configuración inicial.
      ROOT_FOLDER_ID: '',

      // Permisos que pide el login. spreadsheets = leer/escribir la planilla.
      // drive = crear carpetas y archivos, y poder sobrescribir/exportar.
      SCOPES: 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive'
    };
  </script>
  <style>
  /* ─────────────────────────────────────────────────────────────
     Sistema de diseño — Control de Accidentes SST
     Paleta inspirada en herramientas de control técnico/industrial:
     azul-grafito como base (autoridad, calma), naranja de seguridad
     como acento (color estándar de EPP/señalización en terreno).
     Tipografía IBM Plex: familia técnica y legible, con una variante
     mono para identificadores (ID de caso, RUT, folios) — encuentra
     visualmente la diferencia entre "dato" y "prosa".
     ───────────────────────────────────────────────────────────── */

  :root {
    --color-primario: #0B2A3E;
    --color-primario-claro: #163C55;
    --color-acento: #E4772E;
    --color-acento-suave: #FBE7D6;

    --bg: #F5F6F8;
    --superficie: #FFFFFF;
    --borde: #E1E5EA;

    --texto: #1B2530;
    --texto-secundario: #5C6B7A;
    --texto-tenue: #8A97A3;

    --estado-ok: #2F8659;
    --estado-ok-bg: #E4F3EB;
    --estado-alerta: #C4890F;
    --estado-alerta-bg: #FBF0DB;
    --estado-critico: #C4402D;
    --estado-critico-bg: #FBE6E2;
    --estado-info: #3D6E92;
    --estado-info-bg: #E4EEF4;
    --estado-neutro: #6B7684;
    --estado-neutro-bg: #EBEDF0;

    --radio: 8px;
    --radio-chico: 5px;
    --sombra: 0 1px 2px rgba(11, 42, 62, 0.06), 0 1px 8px rgba(11, 42, 62, 0.04);
    --sombra-flotante: 0 8px 24px rgba(11, 42, 62, 0.14);

    --fuente: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    --fuente-condensada: 'IBM Plex Sans Condensed', var(--fuente);
    --fuente-mono: 'IBM Plex Mono', ui-monospace, monospace;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--texto);
    font-family: var(--fuente);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  h1, h2, h3, h4 {
    font-family: var(--fuente-condensada);
    font-weight: 600;
    margin: 0 0 4px 0;
    color: var(--color-primario);
    letter-spacing: 0.01em;
  }
  h1 { font-size: 22px; }
  h2 { font-size: 18px; }
  h3 { font-size: 15px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--texto-secundario); }

  p { margin: 0 0 8px 0; }

  a { color: var(--color-primario-claro); }

  .mono { font-family: var(--fuente-mono); font-size: 13px; letter-spacing: -0.01em; }

  button, input, select, textarea { font-family: inherit; font-size: inherit; }

  /* ── Layout general ─────────────────────────────────────────── */

  #app { display: flex; min-height: 100vh; }

  #sidebar {
    width: 220px;
    flex-shrink: 0;
    background: var(--color-primario);
    color: #fff;
    display: flex;
    flex-direction: column;
    padding: 20px 0;
  }

  #sidebar .marca {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 20px 20px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.12);
    margin-bottom: 16px;
  }
  #sidebar .marca img { width: 32px; height: 32px; object-fit: contain; border-radius: 4px; background: #fff; }
  #sidebar .marca-textos { display: flex; flex-direction: column; min-width: 0; }
  #sidebar .marca-empresa { font-size: 12px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #sidebar .marca-sistema { font-family: var(--fuente-condensada); font-weight: 600; font-size: 14px; color: #fff; }

  #sidebar nav { display: flex; flex-direction: column; gap: 2px; padding: 0 10px; }

  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    border-radius: var(--radio-chico);
    color: rgba(255,255,255,0.75);
    cursor: pointer;
    font-size: 13.5px;
    font-weight: 500;
    transition: background 0.12s ease, color 0.12s ease;
    user-select: none;
  }
  .nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .nav-item.activo { background: var(--color-acento); color: #fff; }
  .nav-item .icono { width: 16px; text-align: center; opacity: 0.9; }

  #sidebar .usuario-actual {
    margin-top: auto;
    padding: 14px 20px;
    border-top: 1px solid rgba(255,255,255,0.12);
    font-size: 12px;
    color: rgba(255,255,255,0.65);
  }
  #sidebar .usuario-actual .u-nombre { color: #fff; font-weight: 600; display: block; margin-bottom: 2px; }
  #sidebar .usuario-actual .u-rol {
    display: inline-block; margin-top: 4px;
    background: rgba(255,255,255,0.12); color: #fff;
    padding: 2px 8px; border-radius: 20px; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.03em;
  }

  #main { flex: 1; min-width: 0; display: flex; flex-direction: column; }

  #topbar {
    height: 56px; flex-shrink: 0;
    background: var(--superficie);
    border-bottom: 1px solid var(--borde);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px;
  }
  #topbar h1 { margin: 0; }

  #contenido { flex: 1; padding: 24px; overflow-y: auto; }

  .vista { display: none; }
  .vista.activa { display: block; animation: aparecer 0.15s ease; }
  @keyframes aparecer { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  /* ── Componentes ────────────────────────────────────────────── */

  .tarjeta {
    background: var(--superficie);
    border: 1px solid var(--borde);
    border-radius: var(--radio);
    box-shadow: var(--sombra);
    padding: 18px 20px;
  }

  .grid-kpi { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; margin-bottom: 24px; }
  @media (max-width: 1100px) { .grid-kpi { grid-template-columns: repeat(3, 1fr); } }

  .kpi { padding: 16px 18px; border-left: 3px solid var(--color-acento); }
  .kpi .kpi-valor { font-family: var(--fuente-condensada); font-size: 30px; font-weight: 600; color: var(--color-primario); line-height: 1; }
  .kpi .kpi-etiqueta { margin-top: 6px; font-size: 12px; color: var(--texto-secundario); text-transform: uppercase; letter-spacing: 0.03em; }
  .kpi.critico { border-left-color: var(--estado-critico); }
  .kpi.critico .kpi-valor { color: var(--estado-critico); }
  .kpi.alerta { border-left-color: var(--estado-alerta); }

  .pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 20px;
    font-size: 11.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em;
    white-space: nowrap;
  }
  .pill-ok { background: var(--estado-ok-bg); color: var(--estado-ok); }
  .pill-alerta { background: var(--estado-alerta-bg); color: var(--estado-alerta); }
  .pill-critico { background: var(--estado-critico-bg); color: var(--estado-critico); }
  .pill-info { background: var(--estado-info-bg); color: var(--estado-info); }
  .pill-neutro { background: var(--estado-neutro-bg); color: var(--estado-neutro); }

  table.tabla { width: 100%; border-collapse: collapse; }
  table.tabla th {
    text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.03em;
    color: var(--texto-secundario); font-weight: 600;
    padding: 10px 12px; border-bottom: 2px solid var(--borde);
  }
  table.tabla td { padding: 11px 12px; border-bottom: 1px solid var(--borde); font-size: 13.5px; vertical-align: middle; }
  table.tabla tbody tr { cursor: pointer; transition: background 0.1s ease; }
  table.tabla tbody tr:hover { background: #FAFBFC; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: var(--radio-chico);
    border: 1px solid transparent;
    font-weight: 600; font-size: 13px; cursor: pointer;
    transition: filter 0.12s ease, background 0.12s ease;
  }
  .btn:active { filter: brightness(0.94); }
  .btn-primario { background: var(--color-acento); color: #fff; }
  .btn-primario:hover { background: #D1691F; }
  .btn-secundario { background: var(--superficie); color: var(--color-primario); border-color: var(--borde); }
  .btn-secundario:hover { background: #F1F3F5; }
  .btn-texto { background: transparent; color: var(--color-primario-claro); padding: 6px 8px; }
  .btn-texto:hover { text-decoration: underline; }
  .btn-peligro { background: var(--estado-critico-bg); color: var(--estado-critico); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px 18px; }
  @media (max-width: 900px) { .form-grid { grid-template-columns: repeat(2, 1fr); } }

  .campo { display: flex; flex-direction: column; gap: 5px; }
  .campo.span-2 { grid-column: span 2; }
  .campo.span-3 { grid-column: span 3; }
  .campo label { font-size: 12px; font-weight: 600; color: var(--texto-secundario); }
  .campo input, .campo select, .campo textarea {
    padding: 8px 10px; border: 1px solid var(--borde); border-radius: var(--radio-chico);
    background: var(--superficie); color: var(--texto);
  }
  .campo input:focus, .campo select:focus, .campo textarea:focus {
    outline: none; border-color: var(--color-acento); box-shadow: 0 0 0 3px var(--color-acento-suave);
  }
  .campo textarea { resize: vertical; min-height: 70px; }

  .seccion-titulo {
    display: flex; align-items: center; justify-content: space-between;
    margin: 28px 0 12px 0; padding-bottom: 8px; border-bottom: 1px solid var(--borde);
  }
  .seccion-titulo:first-child { margin-top: 0; }

  .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--borde); margin-bottom: 18px; }
  .tab {
    padding: 10px 16px; font-size: 13px; font-weight: 600; color: var(--texto-secundario);
    cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px;
  }
  .tab:hover { color: var(--texto); }
  .tab.activo { color: var(--color-primario); border-bottom-color: var(--color-acento); }

  .checklist-categoria { margin-bottom: 22px; }
  .checklist-categoria-header {
    display: flex; align-items: center; justify-content: space-between;
    font-family: var(--fuente-condensada); font-weight: 600; font-size: 13px;
    color: var(--color-primario); text-transform: uppercase; letter-spacing: 0.03em;
    padding-bottom: 6px; margin-bottom: 8px; border-bottom: 1px solid var(--borde);
  }
  .checklist-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 4px; border-bottom: 1px solid #F0F2F4;
  }
  .checklist-item:last-child { border-bottom: none; }
  .checklist-item .ci-nombre { flex: 1; min-width: 0; }
  .checklist-item .ci-condicion { font-size: 11.5px; color: var(--texto-tenue); font-style: italic; }
  .checklist-item .ci-acciones { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

  .barra-progreso { height: 6px; border-radius: 4px; background: var(--estado-neutro-bg); overflow: hidden; }
  .barra-progreso-relleno { height: 100%; background: var(--estado-ok); transition: width 0.2s ease; }

  .vacio {
    text-align: center; padding: 48px 20px; color: var(--texto-tenue);
  }

  .modal-fondo {
    position: fixed; inset: 0; background: rgba(11, 42, 62, 0.35);
    display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  .modal {
    background: var(--superficie); border-radius: var(--radio); box-shadow: var(--sombra-flotante);
    width: 480px; max-width: 92vw; max-height: 88vh; overflow-y: auto; padding: 22px 24px;
  }

  .toast-contenedor { position: fixed; bottom: 20px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    background: var(--color-primario); color: #fff; padding: 12px 18px; border-radius: var(--radio-chico);
    box-shadow: var(--sombra-flotante); font-size: 13px; max-width: 340px; animation: aparecer 0.15s ease;
  }
  .toast.error { background: var(--estado-critico); }
  .toast.exito { background: var(--estado-ok); }

  .spinner {
    width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff;
    border-radius: 50%; animation: girar 0.7s linear infinite; display: inline-block;
  }
  @keyframes girar { to { transform: rotate(360deg); } }

  .filtros-barra { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .filtros-barra input, .filtros-barra select {
    padding: 7px 10px; border: 1px solid var(--borde); border-radius: var(--radio-chico); background: var(--superficie);
  }

  .zona-carga {
    border: 1.5px dashed var(--borde); border-radius: var(--radio);
    padding: 20px; text-align: center; color: var(--texto-secundario); font-size: 13px;
    cursor: pointer; transition: border-color 0.15s ease, background 0.15s ease;
  }
  .zona-carga:hover { border-color: var(--color-acento); background: var(--color-acento-suave); }

  .badge-version { font-family: var(--fuente-mono); font-size: 11px; color: var(--texto-tenue); }

  /* ── Pantalla de acceso (login / setup / identificación) ─────── */
  .pantalla-acceso {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: var(--color-primario); padding: 20px;
  }
  .tarjeta-acceso {
    background: var(--superficie); border-radius: var(--radio); box-shadow: var(--sombra-flotante);
    width: 420px; max-width: 100%; padding: 32px 30px;
  }
  .tarjeta-acceso h1 { font-size: 19px; margin-bottom: 6px; }
  .tarjeta-acceso p.subt { color: var(--texto-secundario); font-size: 13px; margin-bottom: 22px; }
  .tarjeta-acceso .btn { width: 100%; justify-content: center; padding: 11px; font-size: 13.5px; margin-bottom: 8px; }
  .lista-usuarios-acceso { display: flex; flex-direction: column; gap: 6px; max-height: 300px; overflow-y: auto; margin-bottom: 14px; }
  .item-usuario-acceso {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    padding: 10px 12px; border: 1px solid var(--borde); border-radius: var(--radio-chico);
    cursor: pointer; transition: border-color .12s ease, background .12s ease;
  }
  .item-usuario-acceso:hover { border-color: var(--color-acento); background: var(--color-acento-suave); }
  .item-usuario-acceso .iu-nombre { font-weight: 600; font-size: 13px; }
  .item-usuario-acceso .iu-email { font-size: 11.5px; color: var(--texto-tenue); }
  .caja-ayuda { background: var(--bg); border: 1px solid var(--borde); border-radius: var(--radio-chico); padding: 12px 14px; font-size: 12px; color: var(--texto-secundario); margin-top: 14px; line-height: 1.6; }
  .caja-ayuda code { background: var(--estado-neutro-bg); padding: 1px 5px; border-radius: 3px; font-family: var(--fuente-mono); }
  .caja-id { display: flex; align-items: center; gap: 8px; background: var(--bg); border: 1px solid var(--borde); border-radius: var(--radio-chico); padding: 8px 10px; margin-bottom: 8px; }
  .caja-id code { flex: 1; font-family: var(--fuente-mono); font-size: 12px; overflow-x: auto; white-space: nowrap; }
</style>
</head>
<body>
  <div id="pantalla-acceso" class="pantalla-acceso">
    <div class="tarjeta-acceso" id="tarjeta-acceso"><!-- se pinta por JS: config pendiente / login / setup / identificación --></div>
  </div>

  <div id="app" style="display:none;">
    <aside id="sidebar">
      <div class="marca" id="sidebar-marca"></div>
      <nav id="sidebar-nav"></nav>
      <div class="usuario-actual" id="sidebar-usuario"></div>
    </aside>

    <div id="main">
      <div id="topbar">
        <h1 id="topbar-titulo">Cargando…</h1>
      </div>
      <div id="contenido">
        <div class="vacio"><span class="spinner" style="border-top-color:var(--color-primario); border-color:var(--borde);"></span> Cargando sistema…</div>
      </div>
    </div>
  </div>

  <div class="toast-contenedor" id="toast-contenedor"></div>

  <!-- ── JavaScript.html ── -->
  <script>
  /* =====================================================================
     Control de Accidentes SST — lógica de cliente
     Todo el estado vive en memoria (variable `state`) y se repinta desde
     cero en cada navegación — no hay framework, solo funciones que arman
     HTML con template literals y lo inyectan en #contenido.
     ===================================================================== */

  var state = {
    usuario: null,
    config: {},
    vista: 'dashboard',
    casos: [],
    filtrosCasos: { estado: '', cliente: '', gravedad: '', texto: '' },
    casoActual: null,      // detalle completo del caso abierto (caso+medidas+documentos+historial)
    tabCasoActual: 'datos',
    usuarios: [],
    ocrPendiente: null     // { base64, mimeType, nombre } — PDF usado para autocompletar, se archiva al guardar
  };

  var PERMISOS_CLIENTE = {
    crear_caso: ['administrador', 'apr', 'supervisor'],
    editar_caso: ['administrador', 'apr'],
    cerrar_caso: ['administrador', 'apr'],
    crear_medida: ['administrador', 'apr', 'supervisor'],
    editar_medida: ['administrador', 'apr', 'supervisor'],
    subir_documento: ['administrador', 'apr', 'supervisor'],
    sobrescribir_documento: ['administrador', 'apr'],
    gestionar_usuarios: ['administrador'],
    exportar_csv: ['administrador', 'apr', 'supervisor']
  };
  function puede(accion) {
    var lista = PERMISOS_CLIENTE[accion];
    return !!(lista && state.usuario && lista.indexOf(state.usuario.rol) !== -1);
  }

  var REGIONES_CHILE = [
    'Arica y Parinacota', 'Tarapacá', 'Antofagasta', 'Atacama', 'Coquimbo',
    'Valparaíso', 'Metropolitana', "O'Higgins", 'Maule', 'Ñuble', 'Biobío',
    'La Araucanía', 'Los Ríos', 'Los Lagos', 'Aysén', 'Magallanes'
  ];
  var CLIENTES_SUGERIDOS = ['CLARO', 'ENTEL', 'INFRACO', 'ONNET', 'VTR'];

  // ── Arranque ───────────────────────────────────────────────────────────

  document.addEventListener('DOMContentLoaded', function () {
    if (!CONFIG.CLIENT_ID || CONFIG.CLIENT_ID.indexOf('PEGA_AQUI') === 0) {
      return mostrarPantallaConfigPendiente_();
    }
    initGis_();
    mostrarPantallaLogin_();
  });

  function pintarShell() {
    var logo = state.config.LOGO_URL
      ? '<img src="' + state.config.LOGO_URL + '" alt="logo">'
      : '<div style="width:32px;height:32px;border-radius:4px;background:var(--color-acento);"></div>';

    document.getElementById('sidebar-marca').innerHTML =
      logo +
      '<div class="marca-textos">' +
        '<span class="marca-empresa">' + escapeHtml(state.config.NOMBRE_EMPRESA || '') + '</span>' +
        '<span class="marca-sistema">' + escapeHtml(state.config.NOMBRE_SISTEMA || 'Control de Accidentes SST') + '</span>' +
      '</div>';

    var nav = [
      { v: 'dashboard', icono: '&#9632;', label: 'Dashboard' },
      { v: 'casos', icono: '&#9776;', label: 'Casos' }
    ];
    if (puede('crear_caso')) nav.push({ v: 'nuevo-caso', icono: '&#43;', label: 'Nuevo caso' });
    if (puede('gestionar_usuarios')) nav.push({ v: 'usuarios', icono: '&#9782;', label: 'Usuarios' });

    document.getElementById('sidebar-nav').innerHTML = nav.map(function (n) {
      return '<div class="nav-item" data-vista="' + n.v + '" onclick="navegarA(\'' + n.v + '\')">' +
        '<span class="icono">' + n.icono + '</span>' + n.label + '</div>';
    }).join('');

    document.getElementById('sidebar-usuario').innerHTML =
      '<span class="u-nombre">' + escapeHtml(state.usuario.nombre) + '</span>' +
      escapeHtml(state.usuario.email) +
      '<div class="u-rol">' + escapeHtml(state.usuario.rol.replace('_', ' ')) + '</div>' +

  function escapeHtml(t) {

    return String(t).replace(/[&<>"']/g, function (c) {

      reader.onload = function () {

  <!-- ── AUTH + SETUP (nuevo, reemplaza Apps Script) ── -->
<script>
  /* =====================================================================
     AUTENTICACIÓN + CONFIGURACIÓN INICIAL + CAPA DE SERVICIOS
     Reemplaza por completo a Apps Script: aquí se habla directo con
     Sheets API v4 y Drive API v3 vía REST, usando un token OAuth 2.0
     obtenido con Google Identity Services (GIS). No hay servidor propio.
     ===================================================================== */

  var API_SHEETS = 'https://sheets.googleapis.com/v4/spreadsheets';
  var API_DRIVE = 'https://www.googleapis.com/drive/v3';
  var API_DRIVE_UPLOAD = 'https://www.googleapis.com/upload/drive/v3/files';

  var tokenClient = null;
  var accessToken = null;

  // ── Google Identity Services ────────────────────────────────────────

  function initGis_() {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CONFIG.CLIENT_ID,
      scope: CONFIG.SCOPES,
      callback: function (resp) {
        if (resp.error) {
          mostrarErrorAcceso_('No se pudo iniciar sesión con Google: ' + resp.error);
          return;
        }
        accessToken = resp.access_token;
        onLoginExitoso_();
      }
    });
  }

  function login_() {
    tokenClient.requestAccessToken({ prompt: 'consent' });
  }

  function reautenticarSilencioso_() {
    return new Promise(function (resolve, reject) {
      tokenClient.callback = function (resp) {
        if (resp.error) { reject(new Error(resp.error)); return; }
        accessToken = resp.access_token;
        resolve();
      };
      tokenClient.requestAccessToken({ prompt: '' });
    });
  }

  // Envoltorio de fetch: agrega el token, reintenta una vez si expiró (401).
  function apiFetch_(url, opts) {
    opts = opts || {};
    opts.headers = Object.assign({ 'Authorization': 'Bearer ' + accessToken }, opts.headers || {});
    return fetch(url, opts).then(function (resp) {
      if (resp.status === 401) {
        return reautenticarSilencioso_().then(function () {
          opts.headers['Authorization'] = 'Bearer ' + accessToken;
          return fetch(url, opts);
        });
      }
      return resp;
    }).then(function (resp) {
      if (!resp.ok) {
        return resp.text().then(function (texto) {
          throw new Error('Error API (' + resp.status + '): ' + texto.substring(0, 300));
        });
      }
      return resp;
    });
  }

  // ── Pantallas de acceso ─────────────────────────────────────────────

  function tarjetaAcceso_() { return document.getElementById('tarjeta-acceso'); }

  function mostrarPantallaConfigPendiente_() {
    tarjetaAcceso_().innerHTML =
      '<h1>Falta configurar este archivo</h1>' +
      '<p class="subt">Antes de abrir el sistema, edita el bloque <code>CONFIG</code> al inicio de este mismo archivo HTML.</p>' +
      '<div class="caja-ayuda">' +
        'Falta <code>CLIENT_ID</code>. Búscalo en Google Cloud Console → Credenciales → tu Client ID de OAuth 2.0 ' +
        '(tipo "Aplicación web"). Pégalo en <code>CONFIG.CLIENT_ID</code>, guarda el archivo y vuelve a abrirlo.<br><br>' +
        'Si aún no creaste el Client ID, revisa las instrucciones al final de este archivo (busca <code>GUIA_CONFIGURACION</code>).' +
      '</div>';
  }

  function mostrarPantallaLogin_() {
    tarjetaAcceso_().innerHTML =
      '<h1>Control de Accidentes SST</h1>' +
      '<p class="subt">Conéctate con la cuenta de Google que tiene acceso a la planilla y la carpeta del sistema.</p>' +
      '<button class="btn btn-primario" onclick="login_()">Conectar con Google</button>' +
      '<div id="error-acceso"></div>';
  }

  function mostrarErrorAcceso_(mensaje) {
    var cont = document.getElementById('error-acceso');
    if (cont) cont.innerHTML = '<div class="caja-ayuda" style="border-color:var(--estado-critico); color:var(--estado-critico);">' + escapeHtml(mensaje) + '</div>';
    else mostrarToast(mensaje, 'error');
  }

  function onLoginExitoso_() {
    if (!CONFIG.SPREADSHEET_ID || !CONFIG.ROOT_FOLDER_ID) {
      return mostrarPantallaSetupInicial_();
    }
    continuarDespuesDeLogin_();
  }

  function continuarDespuesDeLogin_() {
    var emailRecordado = localStorage.getItem('sst_usuario_email');
    if (emailRecordado) {
      return SERVICIOS.obtenerUsuarioPorEmail_(emailRecordado).then(function (usuario) {
        if (usuario && (usuario.Activo === true || usuario.Activo === 'sí' || usuario.Activo === 'TRUE')) {
          return entrarComo_(usuario);
        }
        return mostrarPantallaIdentificar_();
      }).catch(function () { return mostrarPantallaIdentificar_(); });
    }
    return mostrarPantallaIdentificar_();
  }

  function mostrarPantallaSetupInicial_() {
    tarjetaAcceso_().innerHTML =
      '<h1>Configuración inicial</h1>' +
      '<p class="subt">No hay una planilla ni carpeta configuradas todavía. Esto crea la planilla madre (7 hojas + catálogo de 43 documentos) y la carpeta raíz en tu Drive — se hace una sola vez.</p>' +
      '<div class="campo" style="margin-bottom:12px;"><label>Tu nombre</label><input type="text" id="setup-nombre"></div>' +
      '<div class="campo" style="margin-bottom:16px;"><label>Tu email</label><input type="email" id="setup-email"></div>' +
      '<button class="btn btn-primario" onclick="ejecutarSetupInicial_(this)">Crear estructura inicial</button>' +
      '<div id="resultado-setup"></div>';
  }

  function ejecutarSetupInicial_(boton) {
    var nombre = document.getElementById('setup-nombre').value.trim();
    var email = document.getElementById('setup-email').value.trim();
    if (!nombre || !email) { mostrarToast('Completa tu nombre y email.', 'error'); return; }

    var textoOriginal = boton.innerHTML;
    boton.disabled = true;
    boton.innerHTML = '<span class="spinner"></span> Creando planilla y carpeta…';

    SERVICIOS.crearEstructuraInicial_(nombre, email).then(function (res) {
      document.getElementById('resultado-setup').innerHTML =
        '<div class="caja-ayuda" style="margin-top:16px;"><strong>Listo.</strong> Copia estos dos valores y pégalos en el bloque ' +
        '<code>CONFIG</code> al inicio del archivo, reemplazando <code>SPREADSHEET_ID</code> y <code>ROOT_FOLDER_ID</code>. ' +
        'Guarda el archivo — desde ahora, cada vez que lo abras (o lo compartas con tu equipo) apuntará a esta misma planilla y carpeta.</div>' +
        '<div class="caja-id"><code>SPREADSHEET_ID: ' + res.spreadsheetId + '</code></div>' +
        '<div class="caja-id"><code>ROOT_FOLDER_ID: ' + res.rootFolderId + '</code></div>' +
        '<a class="btn btn-secundario" href="' + res.spreadsheetUrl + '" target="_blank">Abrir la planilla creada</a>';
      boton.style.display = 'none';
      CONFIG.SPREADSHEET_ID = res.spreadsheetId;
      CONFIG.ROOT_FOLDER_ID = res.rootFolderId;
      mostrarToast('Estructura creada. No olvides guardar los IDs en el archivo antes de cerrar esta pestaña.', 'exito');
      continuarDespuesDeLogin_();
    }).catch(function (err) {
      boton.disabled = false;
      boton.innerHTML = textoOriginal;
      mostrarErrorAcceso_(err.message || String(err));
    });
  }

  function mostrarPantallaIdentificar_() {
    tarjetaAcceso_().innerHTML = '<h1>¿Quién eres?</h1><p class="subt">Cargando usuarios…</p>';
    return SERVICIOS.listarUsuarios().then(function (usuarios) {
      var activos = usuarios.filter(function (u) { return u.Activo === true || u.Activo === 'sí' || u.Activo === 'TRUE'; });
      var html = '<h1>¿Quién eres?</h1><p class="subt">Elige tu nombre de la lista. Este equipo lo recordará para la próxima vez.</p>';

      if (activos.length === 0) {
        html += '<div class="caja-ayuda">Aún no hay usuarios activos registrados. Pide a un administrador que te agregue, ' +
          'o si eres tú quien está configurando el sistema por primera vez, agrégate ahora:</div>' +
          '<div class="campo" style="margin:12px 0;"><label>Tu nombre</label><input type="text" id="id-nombre-nuevo"></div>' +
          '<div class="campo" style="margin-bottom:12px;"><label>Tu email</label><input type="email" id="id-email-nuevo"></div>' +
          '<button class="btn btn-primario" onclick="crearPrimerUsuarioYEntrar_(this)">Registrarme como administrador</button>';
      } else {
        html += '<div class="lista-usuarios-acceso">' + activos.map(function (u) {
          return '<div class="item-usuario-acceso" onclick=\'entrarComo_(' + JSON.stringify(u).replace(/'/g, '&apos;') + ')\'>' +
            '<div><div class="iu-nombre">' + escapeHtml(u.Nombre) + '</div><div class="iu-email">' + escapeHtml(u.Email) + '</div></div>' +
            '<span class="pill pill-info">' + escapeHtml(String(u.Rol).replace('_', ' ')) + '</span>' +
          '</div>';
        }).join('') + '</div>' +
        '<p style="font-size:11.5px; color:var(--texto-tenue);">¿No estás en la lista? Pide a un administrador que te agregue desde la pantalla de Usuarios.</p>';
      }
      tarjetaAcceso_().innerHTML = html;
    }).catch(function (err) { mostrarErrorAcceso_(err.message || String(err)); });
  }

  function crearPrimerUsuarioYEntrar_(boton) {
    var nombre = document.getElementById('id-nombre-nuevo').value.trim();
    var email = document.getElementById('id-email-nuevo').value.trim();
    if (!nombre || !email) { mostrarToast('Completa nombre y email.', 'error'); return; }
    boton.disabled = true;
    var usuario = { Email: email, Nombre: nombre, Rol: 'administrador', Activo: true };
    SERVICIOS.guardarUsuario(usuario).then(function () { entrarComo_(usuario); }).catch(function (err) {
      boton.disabled = false;
      mostrarErrorAcceso_(err.message || String(err));
    });
  }

  function entrarComo_(usuarioFila) {
    localStorage.setItem('sst_usuario_email', usuarioFila.Email);
    return SERVICIOS.obtenerConfiguracion().then(function (config) {
      state.usuario = {
        email: usuarioFila.Email,
        nombre: usuarioFila.Nombre || usuarioFila.Email,
        rol: usuarioFila.Rol || 'solo_lectura',
        activo: true
      };
      state.config = config;
      document.getElementById('pantalla-acceso').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      pintarShell();
      navegarA('dashboard');
    });
  }

  function cambiarUsuario_() {
    localStorage.removeItem('sst_usuario_email');
    document.getElementById('app').style.display = 'none';
    document.getElementById('pantalla-acceso').style.display = 'flex';
    mostrarPantallaIdentificar_();
  }

  // ── Sheets API — helpers genéricos ──────────────────────────────────

  function sheetGetAll_(nombreHoja) {
    var url = API_SHEETS + '/' + CONFIG.SPREADSHEET_ID + '/values/' + encodeURIComponent(nombreHoja);
    return apiFetch_(url).then(function (r) { return r.json(); }).then(function (d) { return d.values || []; });
  }

  function filasAObjetos_(filas) {
    if (filas.length < 2) return [];
    var headers = filas[0];
    return filas.slice(1)
      .filter(function (f) { return f.some(function (c) { return c !== '' && c !== undefined; }); })
      .map(function (f) {
        var obj = {};
        headers.forEach(function (h, j) { obj[h] = f[j] !== undefined ? f[j] : ''; });
        return obj;
      });
  }

  function sheetHeaders_(nombreHoja) {
    var url = API_SHEETS + '/' + CONFIG.SPREADSHEET_ID + '/values/' + encodeURIComponent(nombreHoja + '!1:1');
    return apiFetch_(url).then(function (r) { return r.json(); }).then(function (d) { return (d.values && d.values[0]) || []; });
  }

  function sheetLeerObjetos_(nombreHoja) {
    return sheetGetAll_(nombreHoja).then(filasAObjetos_);
  }

  function sheetAppendObjeto_(nombreHoja, obj) {
    return sheetHeaders_(nombreHoja).then(function (headers) {
      var fila = headers.map(function (h) { return (obj[h] !== undefined && obj[h] !== null) ? obj[h] : ''; });
      var url = API_SHEETS + '/' + CONFIG.SPREADSHEET_ID + '/values/' + encodeURIComponent(nombreHoja) +
        '!A1:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS';
      return apiFetch_(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ values: [fila] }) });
    });
  }

  function columnaALetra_(idx) {
    var letra = '';
    idx += 1;
    while (idx > 0) {
      var rem = (idx - 1) % 26;
      letra = String.fromCharCode(65 + rem) + letra;
      idx = Math.floor((idx - 1) / 26);
    }
    return letra;
  }

  function sheetActualizarPorId_(nombreHoja, idColumna, idValor, cambios) {
    return Promise.all([sheetHeaders_(nombreHoja), sheetGetAll_(nombreHoja)]).then(function (res) {
      var headers = res[0], filas = res[1];
      var idxCol = headers.indexOf(idColumna);
      var filaEncontrada = -1;
      for (var i = 1; i < filas.length; i++) {
        if (String(filas[i][idxCol]) === String(idValor)) { filaEncontrada = i + 1; break; }
      }
      if (filaEncontrada === -1) throw new Error('No se encontró ' + idColumna + '=' + idValor + ' en ' + nombreHoja);

      var data = Object.keys(cambios).map(function (campo) {
        var col = headers.indexOf(campo);
        if (col === -1) return null;
        var letra = columnaALetra_(col);
        return { range: nombreHoja + '!' + letra + filaEncontrada, values: [[cambios[campo]]] };
      }).filter(function (x) { return x; });

      if (data.length === 0) return;
      var url = API_SHEETS + '/' + CONFIG.SPREADSHEET_ID + '/values:batchUpdate';
      return apiFetch_(url, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ valueInputOption: 'USER_ENTERED', data: data })
      });
    });
  }

  function buscarFilaPor_(nombreHoja, campo, valor) {
    return sheetLeerObjetos_(nombreHoja).then(function (filas) {
      return filas.filter(function (f) { return String(f[campo]) === String(valor); })[0] || null;
    });
  }

  function generarIdAnual_(prefijo, nombreHoja, idColumna) {
    var anio = new Date().getFullYear();
    return sheetLeerObjetos_(nombreHoja).then(function (filas) {
      var patron = prefijo + '-' + anio + '-';
      var contador = 0;
      filas.forEach(function (f) {
        if (String(f[idColumna]).indexOf(patron) === 0) contador++;
      });
      return prefijo + '-' + anio + '-' + String(contador + 1).padStart(3, '0');
    });
  }

  function generarIdSecuencial_(prefijo, nombreHoja, idColumna) {
    return sheetLeerObjetos_(nombreHoja).then(function (filas) {
      var maxNum = 0;
      filas.forEach(function (f) {
        var partes = String(f[idColumna]).split('-');
        var n = parseInt(partes[partes.length - 1], 10);
        if (!isNaN(n) && n > maxNum) maxNum = n;
      });
      return prefijo + '-' + String(maxNum + 1).padStart(5, '0');
    });
  }

  // ── Drive API — helpers genéricos ───────────────────────────────────

  function driveGetOrCrearCarpeta_(nombre, parentId) {
    var nombreEscapado = nombre.replace(/'/g, "\\'");
    var q = encodeURIComponent("name='" + nombreEscapado + "' and '" + parentId + "' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false");
    return apiFetch_(API_DRIVE + '/files?q=' + q + '&fields=files(id,name)').then(function (r) { return r.json(); }).then(function (d) {
      if (d.files && d.files.length > 0) return d.files[0].id;
      return apiFetch_(API_DRIVE + '/files?fields=id', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: nombre, mimeType: 'application/vnd.google-apps.folder', parents: [parentId] })
      }).then(function (r) { return r.json(); }).then(function (d2) { return d2.id; });
    });
  }

  // Convierte un string base64 a Blob sin pasar por atob completo en memoria innecesariamente.
  function base64AblobUtil_(base64, mimeType) {
    var bytes = atob(base64);
    var arr = new Uint8Array(bytes.length);
    for (var i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
    return new Blob([arr], { type: mimeType || 'application/octet-stream' });
  }

  function multipartBody_(metadata, blob, boundary) {
    var cabecera = new Blob(
      ['--' + boundary + '\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n' + JSON.stringify(metadata) +
       '\r\n--' + boundary + '\r\nContent-Type: ' + (blob.type || 'application/octet-stream') + '\r\n\r\n'],
      { type: 'text/plain' }
    );
    var cierre = new Blob(['\r\n--' + boundary + '--'], { type: 'text/plain' });
    return new Blob([cabecera, blob, cierre]);
  }

  function driveSubirBase64_(parentId, base64, mimeType, nombreArchivo) {
    var blob = base64AblobUtil_(base64, mimeType);
    var boundary = '-------sst' + Math.random().toString(36).slice(2);
    var cuerpo = multipartBody_({ name: nombreArchivo, parents: [parentId] }, blob, boundary);
    return apiFetch_(API_DRIVE_UPLOAD + '?uploadType=multipart&fields=id,webViewLink,name', {
      method: 'POST', headers: { 'Content-Type': 'multipart/related; boundary=' + boundary }, body: cuerpo
    }).then(function (r) { return r.json(); });
  }

  function driveSobrescribirBase64_(fileId, base64, mimeType) {
    var blob = base64AblobUtil_(base64, mimeType);
    return apiFetch_(API_DRIVE_UPLOAD + '/' + fileId + '?uploadType=media&fields=id,webViewLink,name', {
      method: 'PATCH', headers: { 'Content-Type': mimeType || 'application/octet-stream' }, body: blob
    }).then(function (r) { return r.json(); });
  }

  // OCR: sube el PDF convirtiéndolo a Google Doc con reconocimiento de texto,
  // exporta el texto plano resultante, y bota el Doc temporal a la papelera.
  function driveOcrExtraerTexto_(base64, mimeType) {
    var blob = base64AblobUtil_(base64, mimeType);
    var boundary = '-------sstocr' + Math.random().toString(36).slice(2);
    var cuerpo = multipartBody_({ name: 'OCR_TEMP_' + Date.now(), mimeType: 'application/vnd.google-apps.document' }, blob, boundary);

    return apiFetch_(API_DRIVE_UPLOAD + '?uploadType=multipart&ocrLanguage=es&fields=id', {
      method: 'POST', headers: { 'Content-Type': 'multipart/related; boundary=' + boundary }, body: cuerpo
    }).then(function (r) { return r.json(); }).then(function (creado) {
      return apiFetch_(API_DRIVE + '/files/' + creado.id + '/export?mimeType=text/plain')
        .then(function (r) { return r.text(); })
        .then(function (texto) {
          apiFetch_(API_DRIVE + '/files/' + creado.id, {
            method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ trashed: true })
          }).catch(function () {});
          return texto;
        });
    });
  }

  // ── Utilidades de fecha / texto (equivalentes a Utils.gs) ───────────

  function formatearFechaISO_(fecha) {
    if (!fecha) return '';
    var d = (fecha instanceof Date) ? fecha : new Date(fecha);
    if (isNaN(d.getTime())) return '';
    return d.toISOString().substring(0, 10);
  }
  function formatearFechaHoraISO_(fecha) {
    if (!fecha) return '';
    var d = (fecha instanceof Date) ? fecha : new Date(fecha);
    if (isNaN(d.getTime())) return '';
    return d.toISOString().replace('T', ' ').substring(0, 19);
  }
  function hoyISO_() { return formatearFechaISO_(new Date()); }
  function esFechaAnteriorAHoy_(fechaISO) {
    if (!fechaISO) return false;
    return new Date(fechaISO).getTime() < new Date(hoyISO_()).getTime();
  }
  function sanitizarTexto_(texto) {
    if (!texto) return '';
    return String(texto).normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-zA-Z0-9\s_-]/g, '').trim().replace(/\s+/g, '_');
  }
  function esVerdadero_(v) { return v === true || v === 'sí' || v === 'si' || v === 'SI' || v === 'TRUE' || v === 1; }
</script>

  SERVICIOS.obtenerKPIsDashboard = function () {
    return Promise.all([sheetLeerObjetos_(SHEETS.CASOS), sheetLeerObjetos_(SHEETS.MEDIDAS), sheetLeerObjetos_(SHEETS.DOCUMENTOS_CASO)])
      .then(function (res) {
        var casos = res[0], medidas = res[1], documentos = res[2];
        var totalCasos = casos.length;
        var casosAbiertos = casos.filter(function (c) { return c.Estado_Caso !== ESTADO_CASO.CERRADO; }).length;
        var conteo = { abiertas: 0, en_curso: 0, cerradas: 0, vencidas: 0 };
        medidas.forEach(function (m) {
          var e = calcularEstadoMedida_(m);
          if (e === ESTADO_MEDIDA.VENCIDA) conteo.vencidas++;
          else if (e === ESTADO_MEDIDA.CERRADA) conteo.cerradas++;
          else if (e === ESTADO_MEDIDA.EN_CURSO) conteo.en_curso++;
          else conteo.abiertas++;
        });
        var idsAbiertos = casos.filter(function (c) { return c.Estado_Caso !== ESTADO_CASO.CERRADO; }).map(function (c) { return c.ID_Caso; });
        var documentosPendientes = documentos.filter(function (d) {
          return d.Estado === ESTADO_DOCUMENTO.PENDIENTE && idsAbiertos.indexOf(d.ID_Caso) !== -1;
        }).length;
        return {
          total_accidentes: totalCasos, accidentes_abiertos: casosAbiertos, accidentes_cerrados: totalCasos - casosAbiertos,
          medidas_abiertas: conteo.abiertas + conteo.en_curso, medidas_vencidas: conteo.vencidas, documentos_pendientes: documentosPendientes
        };
      });
  };

  SERVICIOS.obtenerDesgloseDashboard = function () {
    return sheetLeerObjetos_(SHEETS.CASOS).then(function (casos) {
      var porCliente = {}, porGravedad = {};
      casos.forEach(function (c) {
        porCliente[c.Cliente] = (porCliente[c.Cliente] || 0) + 1;
        porGravedad[c.Gravedad] = (porGravedad[c.Gravedad] || 0) + 1;
      });
      return { por_cliente: porCliente, por_gravedad: porGravedad };
    });
  };

  // ── Documentos / checklist ───────────────────────────────────────────

  function inicializarChecklistCaso_(idCaso, gravedad, subcarpetas, versionCatalogo) {
    return sheetLeerObjetos_(SHEETS.CATALOGO).then(function (catalogo) {
      var itemsAplicables = catalogo.filter(function (item) {
        if (item.Version_Catalogo !== versionCatalogo || !esVerdadero_(item.Activo)) return false;
        if (esVerdadero_(item.Aplica_Siempre)) return true;
        if ((gravedad === GRAVEDAD.GRAVE || gravedad === GRAVEDAD.FATAL) && esVerdadero_(item.Aplica_Solo_Grave_NT142)) return true;
        if (gravedad === GRAVEDAD.FATAL && esVerdadero_(item.Aplica_Solo_Fatal)) return true;
        return false;
      });

      return generarIdSecuencial_('DOC', SHEETS.DOCUMENTOS_CASO, 'ID_Registro').then(function (primerId) {
        var numeroBase = parseInt(primerId.split('-').pop(), 10);
        var filas = itemsAplicables.map(function (item, i) {
          return {
            ID_Registro: 'DOC-' + String(numeroBase + i).padStart(5, '0'),
            ID_Caso: idCaso, ID_Item_Catalogo: item.ID_Item, Categoria: item.Categoria, Nombre_Documento: item.Nombre_Documento,
            Condicion_Adicional: item.Condicion_Adicional || '', Carpeta_Drive_Id: subcarpetas[item.Categoria] || '',
            Estado: ESTADO_DOCUMENTO.PENDIENTE, Version: 0, Drive_File_Id: '', URL_Drive: '', Nombre_Archivo: '',
            Fecha_Carga: '', Cargado_Por: '', Es_Personalizado: false
          };
        });
        if (filas.length === 0) return;
        return sheetAppendVarias_(SHEETS.DOCUMENTOS_CASO, filas);
      });
    });
  }

  function sheetAppendVarias_(nombreHoja, objetos) {
    return sheetHeaders_(nombreHoja).then(function (headers) {
      var filas = objetos.map(function (obj) {
        return headers.map(function (h) { return (obj[h] !== undefined && obj[h] !== null) ? obj[h] : ''; });
      });
      var url = API_SHEETS + '/' + CONFIG.SPREADSHEET_ID + '/values/' + encodeURIComponent(nombreHoja) +
        '!A1:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS';
      return apiFetch_(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ values: filas }) });
    });
  }

  SERVICIOS.listarChecklistPorCaso = function (idCaso) {
    return sheetLeerObjetos_(SHEETS.DOCUMENTOS_CASO).then(function (docs) {
      return docs.filter(function (d) { return d.ID_Caso === idCaso; }).sort(function (a, b) { return a.Categoria.localeCompare(b.Categoria); });
    });
  };

  SERVICIOS.agregarDocumentoAdicional = function (idCaso, nombreDocumento, categoria) {
    return buscarFilaPor_(SHEETS.CASOS, 'ID_Caso', idCaso).then(function (caso) {
      if (!caso) throw new Error('Caso ' + idCaso + ' no encontrado.');
      var subcarpetas = caso.Subcarpetas_JSON ? JSON.parse(caso.Subcarpetas_JSON) : {};
      return generarIdSecuencial_('DOC', SHEETS.DOCUMENTOS_CASO, 'ID_Registro').then(function (idRegistro) {
        return sheetAppendObjeto_(SHEETS.DOCUMENTOS_CASO, {
          ID_Registro: idRegistro, ID_Caso: idCaso, ID_Item_Catalogo: '', Categoria: categoria, Nombre_Documento: nombreDocumento,
          Condicion_Adicional: 'Agregado manualmente por ' + state.usuario.email, Carpeta_Drive_Id: subcarpetas[categoria] || '',
          Estado: ESTADO_DOCUMENTO.PENDIENTE, Version: 0, Drive_File_Id: '', URL_Drive: '', Nombre_Archivo: '',
          Fecha_Carga: '', Cargado_Por: '', Es_Personalizado: true
        }).then(function () { return registrarCambio_(idCaso, 'Caso', 'edicion', 'Ítem de checklist agregado: ' + nombreDocumento); })
          .then(function () { return SERVICIOS.listarChecklistPorCaso(idCaso); });
      });
    });
  };

  function extensionDesdeMime_(mimeType, nombreOriginal) {
    if (nombreOriginal && nombreOriginal.indexOf('.') !== -1) return nombreOriginal.split('.').pop();
    var mapa = { 'application/pdf': 'pdf', 'image/jpeg': 'jpg', 'image/png': 'png', 'image/heic': 'heic' };
    return mapa[mimeType] || 'dat';
  }

  SERVICIOS.subirDocumento = function (idRegistro, base64Data, mimeType, nombreOriginal, sobrescribir) {
    return buscarFilaPor_(SHEETS.DOCUMENTOS_CASO, 'ID_Registro', idRegistro).then(function (registro) {
      if (!registro) throw new Error('Ítem de checklist ' + idRegistro + ' no encontrado.');
      if (!registro.Carpeta_Drive_Id) throw new Error('Este ítem no tiene una carpeta de Drive asociada.');

      var nombreBase = registro.ID_Caso + '_' + sanitizarTexto_(registro.Nombre_Documento);
      var versionNueva = sobrescribir ? registro.Version : (Number(registro.Version) || 0) + 1;

      var subida;
      if (sobrescribir && registro.Drive_File_Id) {
        subida = driveSobrescribirBase64_(registro.Drive_File_Id, base64Data, mimeType);
      } else {
        var nombreFinal = nombreBase + '_v' + versionNueva + '.' + extensionDesdeMime_(mimeType, nombreOriginal);
        subida = driveSubirBase64_(registro.Carpeta_Drive_Id, base64Data, mimeType, nombreFinal);
      }

      return subida.then(function (resultado) {
        return sheetActualizarPorId_(SHEETS.DOCUMENTOS_CASO, 'ID_Registro', idRegistro, {
          Estado: ESTADO_DOCUMENTO.CARGADO, Version: versionNueva, Drive_File_Id: resultado.id,
          URL_Drive: resultado.webViewLink || ('https://drive.google.com/file/d/' + resultado.id + '/view'),
          Nombre_Archivo: resultado.name, Fecha_Carga: formatearFechaHoraISO_(new Date()), Cargado_Por: state.usuario.email
        });
      }).then(function () {
        return registrarCambio_(idRegistro, 'Documento', sobrescribir ? 'sobrescritura' : 'carga_documento',
          (sobrescribir ? 'Archivo sobrescrito' : 'Nueva versión v' + versionNueva) + ' — ' + registro.Nombre_Documento);
      }).then(function () { return SERVICIOS.listarChecklistPorCaso(registro.ID_Caso); });
    });
  };

  SERVICIOS.marcarNoAplica = function (idRegistro, motivo) {
    return buscarFilaPor_(SHEETS.DOCUMENTOS_CASO, 'ID_Registro', idRegistro).then(function (registro) {
      if (!registro) throw new Error('Ítem ' + idRegistro + ' no encontrado.');
      return sheetActualizarPorId_(SHEETS.DOCUMENTOS_CASO, 'ID_Registro', idRegistro, { Estado: ESTADO_DOCUMENTO.NO_APLICA })
        .then(function () { return registrarCambio_(idRegistro, 'Documento', 'edicion', 'Marcado como no aplica. Motivo: ' + (motivo || '—')); })
        .then(function () { return SERVICIOS.listarChecklistPorCaso(registro.ID_Caso); });
    });
  };

  // ── OCR ──────────────────────────────────────────────────────────────

  var ETIQUETAS_FORMATO_ZENER = {
    APR_A_Cargo: ['APR A CARGO'], Dependencia: ['Dependencia'], Nombre_Empresa: ['Nombre de empresa'],
    RUT_Trabajador: ['RUT Trabajador'], Nombre_Trabajador: ['Nombre Trabajador'], Cargo: ['Cargo'],
    Region: ['Región', 'Region'], Supervisor_A_Cargo: ['Supervisor a cargo'], Tipo_Servicio: ['Tipo de servicio'],
    Proyecto: ['Proyecto'], Cliente: ['Cliente'], Fecha_Contrato: ['Fecha contrato'], Edad: ['Edad'],
    Legalidad: ['Legalidad'], Tipo_Siniestro: ['Tipo siniestro'], Calificacion: ['Calificación (STP/CTP)', 'Calificacion (STP/CTP)'],
    Direccion: ['Dirección del accidente', 'Direccion del accidente'], Comuna: ['Comuna'], Ciudad: ['Ciudad'],
    Hora_Siniestro: ['Hora Siniestro'], Fecha_Siniestro: ['Fecha Siniestro'], Dias_Reposo: ['Días de reposo', 'Dias de reposo'],
    Fecha_Inicio_Reposo: ['Fecha inicio reposo'], Hora_Ingreso_Turno: ['Hora de ingreso al turno'],
    Horas_Trabajo_Al_Momento: ['Horas de trabajo al momento del acc.', 'Horas de trabajo al momento del acc']
  };
  var ETIQUETA_DESCRIPCION = 'Descripción del accidente';

  function buscarValorPorEtiqueta_(lineas, etiquetas) {
    for (var i = 0; i < lineas.length; i++) {
      var linea = lineas[i];
      for (var j = 0; j < etiquetas.length; j++) {
        var etiqueta = etiquetas[j];
        var idx = linea.toLowerCase().indexOf(etiqueta.toLowerCase());
        if (idx === -1) continue;
        var resto = linea.substring(idx + etiqueta.length).replace(/^[:\s]+/, '').trim();
        if (resto.length > 0 && resto.length < 120) return resto;
        if (i + 1 < lineas.length) {
          var siguiente = lineas[i + 1];
          var esOtraEtiqueta = Object.keys(ETIQUETAS_FORMATO_ZENER).some(function (c) {
            return ETIQUETAS_FORMATO_ZENER[c].some(function (e) { return siguiente.toLowerCase().indexOf(e.toLowerCase()) === 0; });
          });
          if (!esOtraEtiqueta) return siguiente;
        }
      }
    }
    return '';
  }

  function buscarParrafoDespuesDe_(lineas, etiqueta) {
    for (var i = 0; i < lineas.length; i++) {
      if (lineas[i].toLowerCase().indexOf(etiqueta.toLowerCase()) !== -1) {
        var parrafo = [];
        for (var j = i + 1; j < lineas.length && j < i + 9; j++) {
          if (lineas[j].toLowerCase().indexOf('lista de hechos') !== -1) break;
          parrafo.push(lineas[j]);
        }
        return parrafo.join(' ');
      }
    }
    return '';
  }

  function parsearCamposFormatoZener_(texto) {
    var lineas = texto.split('\n').map(function (l) { return l.trim(); }).filter(function (l) { return l.length > 0; });
    var campos = {};
    Object.keys(ETIQUETAS_FORMATO_ZENER).forEach(function (campo) {
      campos[campo] = buscarValorPorEtiqueta_(lineas, ETIQUETAS_FORMATO_ZENER[campo]);
    });
    campos.Descripcion_Accidente = buscarParrafoDespuesDe_(lineas, ETIQUETA_DESCRIPCION);
    return campos;
  }

  SERVICIOS.ocrExtraerDatosDesdeInforme = function (base64Data, mimeType, nombreArchivo) {
    return driveOcrExtraerTexto_(base64Data, mimeType).then(function (texto) {
      return { campos: parsearCamposFormatoZener_(texto), textoReconocidoLength: texto.length };
    });
  };

  // ── Exportación CSV / ZIP ───────────────────────────────────────────

  function generarCSVDeFilas_(filas) {
    return filas.map(function (fila) {
      return fila.map(function (celda) {
        var texto = (celda === null || celda === undefined) ? '' : String(celda);
        if (texto.indexOf('"') !== -1 || texto.indexOf(',') !== -1 || texto.indexOf('\n') !== -1) {
          texto = '"' + texto.replace(/"/g, '""') + '"';
        }
        return texto;
      }).join(',');
    }).join('\r\n');
  }

  SERVICIOS.exportarRespaldoCompletoZIP = function () {
    var hojas = [SHEETS.CASOS, SHEETS.MEDIDAS, SHEETS.DOCUMENTOS_CASO, SHEETS.HISTORIAL];
    return Promise.all(hojas.map(function (h) {
      return sheetGetAll_(h).then(function (filas) { return { nombre: h, csv: generarCSVDeFilas_(filas) }; });
    })).then(function (resultados) {
      var zip = new JSZip();
      resultados.forEach(function (r) { zip.file(r.nombre + '.csv', r.csv); });
      return zip.generateAsync({ type: 'base64' });
    }).then(function (base64) {
      return { nombreArchivo: 'respaldo_SST_' + hoyISO_() + '.zip', base64: base64 };
    }).then(function (res) {
      return registrarCambio_('TODAS', 'Configuracion', 'edicion', 'Exportación de respaldo solicitada').then(function () { return res; });
    });
  };

  // ── Configuración inicial (setup, una sola vez) ─────────────────────

  SERVICIOS.crearEstructuraInicial_ = function (nombreAdmin, emailAdmin) {
    var sheetsBody = {
      properties: { title: 'SST - Control de Accidentes - DB' },
      sheets: Object.keys(DEFINICION_HOJAS).map(function (nombre) { return { properties: { title: nombre } }; })
    };

    var spreadsheetId, spreadsheetUrl, rootFolderId;

    return apiFetch_(API_SHEETS, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(sheetsBody) })
      .then(function (r) { return r.json(); })
      .then(function (creada) {
        spreadsheetId = creada.spreadsheetId;
        spreadsheetUrl = creada.spreadsheetUrl;
        CONFIG.SPREADSHEET_ID = spreadsheetId; // se necesita ya para los helpers de sheetXxx_ de aquí en adelante

        var data = Object.keys(DEFINICION_HOJAS).map(function (nombre) {
          return { range: nombre + '!A1', values: [DEFINICION_HOJAS[nombre]] };
        });
        return apiFetch_(API_SHEETS + '/' + spreadsheetId + '/values:batchUpdate', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ valueInputOption: 'RAW', data: data })
        });
      })
      .then(function () {
        var filasCatalogo = CATALOGO_V1.map(function (it) { return [it[0], 'v1', it[1], it[2], it[3], it[4], it[5], it[6], it[7], true]; });
        return sheetAppendVarias_(SHEETS.CATALOGO, filasCatalogo.map(function (fila) {
          var obj = {}; DEFINICION_HOJAS.Catalogo_Documentos.forEach(function (h, i) { obj[h] = fila[i]; }); return obj;
        }));
      })
      .then(function () {
        return sheetAppendVarias_(SHEETS.CONFIGURACION, [
          { Clave: 'NOMBRE_EMPRESA', Valor: 'ZENER AUSTRAL LTDA.' },
          { Clave: 'NOMBRE_SISTEMA', Valor: 'Control de Accidentes SST' },
          { Clave: 'LOGO_URL', Valor: '' },
          { Clave: 'COLOR_PRIMARIO', Valor: '#0B2A3E' },
          { Clave: 'COLOR_ACENTO', Valor: '#E4772E' },
          { Clave: 'VERSION_CATALOGO_ACTIVA', Valor: 'v1' }
        ]);
      })
      .then(function () {
        return sheetAppendObjeto_(SHEETS.USUARIOS, { Email: emailAdmin, Nombre: nombreAdmin, Rol: 'administrador', Activo: true });
      })
      .then(function () {
        return apiFetch_(API_DRIVE + '/files?fields=id', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: 'SST - Control de Accidentes', mimeType: 'application/vnd.google-apps.folder' })
        });
      })
      .then(function (r) { return r.json(); })
      .then(function (carpeta) {
        rootFolderId = carpeta.id;
        CONFIG.ROOT_FOLDER_ID = rootFolderId;
        return { spreadsheetId: spreadsheetId, spreadsheetUrl: spreadsheetUrl, rootFolderId: rootFolderId };
      });
  };
</script>

  <!-- ── JavaScript_Dashboard.html ── -->
  <script>
  function cargarDashboard() {
    elTopbarTitulo('Dashboard');
    elContenido().innerHTML = '<div class="vacio"><span class="spinner" style="border-top-color:var(--color-primario); border-color:var(--borde);"></span> Cargando indicadores…</div>';

    Promise.all([llamar('obtenerKPIsDashboard'), llamar('obtenerDesgloseDashboard')])
      .then(function (res) { renderDashboard(res[0], res[1]); })
      .catch(mostrarError);
  }

  function renderDashboard(kpis, desglose) {
    var tarjetas = [
      { valor: kpis.total_accidentes, etiqueta: 'Total accidentes', clase: '' },
      { valor: kpis.accidentes_abiertos, etiqueta: 'Accidentes abiertos', clase: 'alerta' },
      { valor: kpis.accidentes_cerrados, etiqueta: 'Accidentes cerrados', clase: '' },
      { valor: kpis.medidas_abiertas, etiqueta: 'Medidas abiertas', clase: 'alerta' },
      { valor: kpis.medidas_vencidas, etiqueta: 'Medidas vencidas', clase: 'critico' },
      { valor: kpis.documentos_pendientes, etiqueta: 'Documentos pendientes', clase: 'critico' }
    ];

    var html = '<div class="grid-kpi">' + tarjetas.map(function (t) {
      return '<div class="tarjeta kpi ' + t.clase + '"><div class="kpi-valor">' + t.valor + '</div>' +
        '<div class="kpi-etiqueta">' + t.etiqueta + '</div></div>';
    }).join('') + '</div>';

    html += '<div class="form-grid" style="grid-template-columns: 1fr 1fr;">';
    html += '<div class="tarjeta">' + barraDesglose_('Casos por cliente', desglose.por_cliente) + '</div>';
    html += '<div class="tarjeta">' + barraDesglose_('Casos por gravedad', desglose.por_gravedad) + '</div>';
    html += '</div>';

    html += '<div class="seccion-titulo"><h2>Accesos rápidos</h2></div>';
    html += '<div style="display:flex; gap:10px;">';
    html += '<button class="btn btn-secundario" onclick="navegarA(\'casos\')">Ver todos los casos</button>';
    if (puede('crear_caso')) html += '<button class="btn btn-primario" onclick="navegarA(\'nuevo-caso\')">+ Registrar accidente</button>';
    if (puede('exportar_csv')) html += '<button class="btn btn-secundario" onclick="exportarRespaldo(this)">Exportar respaldo (ZIP)</button>';
    html += '</div>';

    elContenido().innerHTML = html;
  }

  function barraDesglose_(titulo, mapa) {
    var claves = Object.keys(mapa || {}).filter(function (k) { return k && k !== 'undefined'; });
    var total = claves.reduce(function (s, k) { return s + mapa[k]; }, 0) || 1;
    var html = '<h3 style="margin-bottom:14px;">' + titulo + '</h3>';
    if (claves.length === 0) {
      html += '<p style="color:var(--texto-tenue); font-size:13px;">Sin datos aún.</p>';
      return html;
    }
    claves.sort(function (a, b) { return mapa[b] - mapa[a]; });
    html += claves.map(function (k) {
      var pct = Math.round((mapa[k] / total) * 100);
      return '<div style="margin-bottom:10px;">' +
        '<div style="display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:4px;">' +
          '<span>' + escapeHtml(k) + '</span><span class="mono">' + mapa[k] + '</span>' +
        '</div>' +
        '<div class="barra-progreso"><div class="barra-progreso-relleno" style="width:' + pct + '%;"></div></div>' +
      '</div>';
    }).join('');
    return html;
  }

  function exportarRespaldo(boton) {
    conSpinner(boton, llamar('exportarRespaldoCompletoZIP')).then(function (res) {
      descargarBase64_(res.base64, res.nombreArchivo, 'application/zip');
      mostrarToast('Respaldo generado: ' + res.nombreArchivo, 'exito');
    }).catch(mostrarError);
  }

  function descargarBase64_(base64, nombreArchivo, mimeType) {
    var link = document.createElement('a');
    link.href = 'data:' + mimeType + ';base64,' + base64;
    link.download = nombreArchivo;
    document.body.appendChild(link);
    link.click();
    link.remove();
  }
</script>

        opcion_('cerrado', 'Cerrado', f.estado) +
      '</select>' +
      '<select id="f-gravedad">' +
        opcion_('', 'Todas las gravedades', f.gravedad) +

        opcion_('GRAVE', 'Grave · NT142', f.gravedad) +

      '</select>' +
      '<input type="text" id="f-cliente" placeholder="Cliente" value="' + escapeHtml(f.cliente) + '" style="width:140px;" list="lista-clientes">' +
      '<button class="btn btn-secundario" onclick="aplicarFiltrosCasos()">Filtrar</button>' +
      (puede('crear_caso') ? '<button class="btn btn-primario" style="margin-left:auto;" onclick="navegarA(\'nuevo-caso\')">+ Registrar accidente</button>' : '') +
    '</div>';

    if (state.casos.length === 0) {
      html += '<div class="tarjeta vacio"><h3>Sin casos que coincidan</h3><p>Ajusta los filtros o registra un nuevo accidente.</p></div>';
      elContenido().innerHTML = html;
      return;
    }

    html += '<div class="tarjeta" style="padding:0;">' +
      '<table class="tabla"><thead><tr>' +
        '<th>N° Caso</th><th>Trabajador</th><th>Cliente</th><th>Fecha siniestro</th>' +
        '<th>Gravedad</th><th>Estado</th>' +
      '</tr></thead><tbody>' +
      state.casos.map(function (c) {
        return '<tr onclick="navegarA(\'caso-detalle\',\'' + c.ID_Caso + '\')">' +
          '<td class="mono">' + escapeHtml(c.ID_Caso) + '</td>' +

  function agregarDatalistClientes_() {

    dl.innerHTML = CLIENTES_SUGERIDOS.map(function (c) { return '<option value="' + c + '">'; }).join('');
    document.body.appendChild(dl);
  }

  function opcion_(valor, etiqueta, actual) {
    return '<option value="' + valor + '"' + (valor === actual ? ' selected' : '') + '>' + etiqueta + '</option>';
  }

  function aplicarFiltrosCasos() {
    state.filtrosCasos = {
      texto: document.getElementById('f-texto').value.trim(),
      estado: document.getElementById('f-estado').value,
      gravedad: document.getElementById('f-gravedad').value,
      cliente: document.getElementById('f-cliente').value.trim()
    };
    cargarCasos();

</script>

  <!-- ── JavaScript_NuevoCaso.html ── -->
  <script>
  function renderNuevoCaso() {
    elTopbarTitulo('Nuevo caso');
    state.ocrPendiente = null;

    var html = '';

    html += '<div class="tarjeta" style="margin-bottom:20px;">' +
      '<h3 style="margin-bottom:4px;">Autocompletar desde PDF (opcional)</h3>' +
      '<p style="font-size:12.5px; color:var(--texto-secundario); margin-bottom:12px;">' +
        'Sube el informe de investigación (formato ZN-FT-SST-050) y el sistema intentará reconocer los datos ' +
        'del trabajador y del siniestro. El árbol de causas no se procesa: el PDF completo se archiva tal cual ' +
        'en la carpeta del caso al guardar. Siempre revisa los datos antes de guardar.' +
      '</p>' +
      '<div class="zona-carga" onclick="document.getElementById(\'input-ocr-pdf\').click()" id="zona-ocr">' +
        '&#8593; Haz clic para seleccionar el PDF del informe' +
      '</div>' +
      '<input type="file" id="input-ocr-pdf" accept="application/pdf" style="display:none;" onchange="manejarOCR(this)">' +
    '</div>';

    html += '<form id="form-nuevo-caso" onsubmit="return false;">';

    html += seccionCampos_('Datos de la empresa y contrato', [
      campoTexto_('Dependencia', 'Dependencia', { list: 'dl-dependencia' }),
      campoTexto_('Nombre_Empresa', 'Nombre de empresa'),
      campoTexto_('Cliente', 'Cliente', { list: 'dl-clientes' }),
      campoTexto_('Proyecto', 'Proyecto'),
      campoTexto_('Tipo_Servicio', 'Tipo de servicio')
    ]);

    html += seccionCampos_('Datos del trabajador', [
      campoTexto_('RUT_Trabajador', 'RUT trabajador'),
      campoTexto_('Nombre_Trabajador', 'Nombre trabajador', { requerido: true }),
      campoTexto_('Cargo', 'Cargo'),
      campoTexto_('Region', 'Región', { list: 'dl-regiones' }),
      campoFecha_('Fecha_Contrato', 'Fecha contrato'),
      campoNumero_('Edad', 'Edad'),
      campoTexto_('Legalidad', 'Legalidad'),
      campoTexto_('Supervisor_A_Cargo', 'Supervisor a cargo')
    ]);

    html += seccionCampos_('Clasificación del siniestro', [
      campoTexto_('Tipo_Siniestro', 'Tipo de siniestro', { list: 'dl-tipo-siniestro' }),
      campoTexto_('Calificacion', 'Calificación (STP/CTP)', { list: 'dl-calificacion' }),
      campoFecha_('Fecha_Siniestro', 'Fecha siniestro', { requerido: true }),
      campoHora_('Hora_Siniestro', 'Hora siniestro'),
      campoTexto_('Direccion', 'Dirección del accidente', { span: 2 }),
      campoTexto_('Comuna', 'Comuna'),
      campoTexto_('Ciudad', 'Ciudad'),
      campoHora_('Hora_Ingreso_Turno', 'Hora ingreso al turno'),
      campoTexto_('Horas_Trabajo_Al_Momento', 'Horas trabajadas al momento', { placeholder: 'hh:mm' }),
      campoNumero_('Dias_Reposo', 'Días de reposo'),
      campoFecha_('Fecha_Inicio_Reposo', 'Fecha inicio reposo'),
      campoSelect_('Gravedad', 'Gravedad', [
        ['', 'Selecciona…'], ['LEVE', 'Leve'], ['GRAVE', 'Grave (MINSAL–NT142)'], ['FATAL', 'Fatal']
      ], { requerido: true })
    ]);

    html += seccionCampos_('Descripción e investigación', [
      campoTextarea_('Descripcion_Accidente', 'Descripción del accidente', { span: 3 }),
      campoTextarea_('Causa_Raiz', 'Causa raíz (texto libre)', { span: 3 })
    ]);

    html += seccionCampos_('Responsables', [
      campoTexto_('APR_A_Cargo', 'APR a cargo'),
      campoTexto_('Nombre_Redacta', 'Redacta'),
      campoTexto_('Nombre_Revisa', 'Revisa'),
      campoTexto_('Nombre_Aprueba', 'Aprueba'),
      campoTextarea_('Observaciones', 'Observaciones', { span: 3 })
    ]);

    html += '<div style="display:flex; gap:10px; margin-top:24px;">' +
      '<button type="button" class="btn btn-primario" onclick="guardarNuevoCaso(this)">Crear caso</button>' +
      '<button type="button" class="btn btn-secundario" onclick="navegarA(\'casos\')">Cancelar</button>' +
    '</div>';

    html += '</form>';

    html += '<datalist id="dl-dependencia"><option value="Propio"><option value="Contratista"></datalist>';
    html += '<datalist id="dl-clientes">' + CLIENTES_SUGERIDOS.map(function (c) { return '<option value="' + c + '">'; }).join('') + '</datalist>';
    html += '<datalist id="dl-regiones">' + REGIONES_CHILE.map(function (r) { return '<option value="' + r + '">'; }).join('') + '</datalist>';
    html += '<datalist id="dl-tipo-siniestro"><option value="Accidente de Trabajo"><option value="Accidente de Trayecto"></datalist>';
    html += '<datalist id="dl-calificacion"><option value="STP"><option value="CTP"></datalist>';

    elContenido().innerHTML = html;
  }

  // ── Helpers de construcción de campos ───────────────────────────────────

  function seccionCampos_(titulo, camposHtml) {
    return '<div class="seccion-titulo"><h2>' + titulo + '</h2></div>' +
      '<div class="form-grid">' + camposHtml.join('') + '</div>';
  }

  function campoTexto_(id, label, opts) {
    opts = opts || {};
    var span = opts.span ? ' span-' + opts.span : '';
    return '<div class="campo' + span + '"><label>' + label + (opts.requerido ? ' *' : '') + '</label>' +
      '<input type="text" id="campo-' + id + '"' +
        (opts.list ? ' list="' + opts.list + '"' : '') +
        (opts.placeholder ? ' placeholder="' + opts.placeholder + '"' : '') + '></div>';
  }

  function campoNumero_(id, label, opts) {
    opts = opts || {};
    return '<div class="campo"><label>' + label + '</label><input type="number" id="campo-' + id + '"></div>';
  }

  function campoFecha_(id, label, opts) {
    opts = opts || {};
    return '<div class="campo"><label>' + label + (opts.requerido ? ' *' : '') + '</label><input type="date" id="campo-' + id + '"></div>';
  }

  function campoHora_(id, label) {
    return '<div class="campo"><label>' + label + '</label><input type="time" id="campo-' + id + '"></div>';
  }

  function campoTextarea_(id, label, opts) {
    opts = opts || {};
    var span = opts.span ? ' span-' + opts.span : '';
    return '<div class="campo' + span + '"><label>' + label + '</label><textarea id="campo-' + id + '"></textarea></div>';
  }

  function campoSelect_(id, label, opciones, opts) {
    opts = opts || {};
    return '<div class="campo"><label>' + label + (opts.requerido ? ' *' : '') + '</label>' +
      '<select id="campo-' + id + '">' +
        opciones.map(function (o) { return '<option value="' + o[0] + '">' + o[1] + '</option>'; }).join('') +
      '</select></div>';
  }

  var CAMPOS_FORM_CASO = [
    'Dependencia', 'Nombre_Empresa', 'Cliente', 'Proyecto', 'Tipo_Servicio',
    'RUT_Trabajador', 'Nombre_Trabajador', 'Cargo', 'Region', 'Fecha_Contrato', 'Edad', 'Legalidad', 'Supervisor_A_Cargo',
    'Tipo_Siniestro', 'Calificacion', 'Fecha_Siniestro', 'Hora_Siniestro', 'Direccion', 'Comuna', 'Ciudad',
    'Hora_Ingreso_Turno', 'Horas_Trabajo_Al_Momento', 'Dias_Reposo', 'Fecha_Inicio_Reposo', 'Gravedad',
    'Descripcion_Accidente', 'Causa_Raiz', 'APR_A_Cargo', 'Nombre_Redacta', 'Nombre_Revisa', 'Nombre_Aprueba', 'Observaciones'
  ];

  function recolectarFormCaso_() {
    var datos = {};
    CAMPOS_FORM_CASO.forEach(function (campo) {
      var el = document.getElementById('campo-' + campo);
      if (el) datos[campo] = el.value.trim ? el.value.trim() : el.value;
    });
    return datos;
  }

  function pintarFormCaso_(campos) {
    var rellenados = 0;
    Object.keys(campos).forEach(function (campo) {
      var el = document.getElementById('campo-' + campo);
      if (el && campos[campo]) {
        el.value = campos[campo];
        rellenados++;
      }
    });
    return rellenados;
  }

  // ── OCR ──────────────────────────────────────────────────────────────

  function manejarOCR(input) {
    var file = input.files[0];
    if (!file) return;

    var zona = document.getElementById('zona-ocr');
    zona.innerHTML = '<span class="spinner" style="border-top-color:var(--color-acento); border-color:var(--borde);"></span> Leyendo PDF y reconociendo texto…';

    leerArchivoBase64(file).then(function (archivo) {
      state.ocrPendiente = archivo; // se reusa para archivar el PDF completo al guardar el caso
      return llamar('ocrExtraerDatosDesdeInforme', archivo.base64, archivo.mimeType, archivo.nombre);
    }).then(function (res) {
      var n = pintarFormCaso_(res.campos);
      zona.innerHTML = '&#10003; PDF procesado — se completaron ' + n + ' campos automáticamente. Revísalos antes de guardar.';
      mostrarToast('Se autocompletaron ' + n + ' campos desde el PDF. Revísalos antes de guardar.', 'exito');
    }).catch(function (err) {
      zona.innerHTML = '&#8593; Haz clic para seleccionar el PDF del informe';
      mostrarError('No se pudo procesar el PDF: ' + (err.message || err) + '. Puedes llenar el formulario manualmente.');
    });
  }

  // ── Guardar ──────────────────────────────────────────────────────────

  function guardarNuevoCaso(boton) {
    var datos = recolectarFormCaso_();

    if (!datos.Nombre_Trabajador) return mostrarError('Falta el nombre del trabajador.');
    if (!datos.Fecha_Siniestro) return mostrarError('Falta la fecha del siniestro.');
    if (!datos.Gravedad) return mostrarError('Debes seleccionar la gravedad — determina qué documentos se exigen.');

    conSpinner(boton, llamar('crearCaso', datos)).then(function (resultado) {
      mostrarToast('Caso ' + resultado.caso.ID_Caso + ' creado. Carpeta y checklist generados en Drive.', 'exito');

      if (state.ocrPendiente) {
        var itemInforme = resultado.documentos.filter(function (d) { return d.ID_Item_Catalogo === 'INV-01'; })[0];
        if (itemInforme) {
          llamar('subirDocumento', itemInforme.ID_Registro, state.ocrPendiente.base64, state.ocrPendiente.mimeType, state.ocrPendiente.nombre, false)
            .then(function () { mostrarToast('Informe de investigación archivado en la carpeta del caso.', 'exito'); })
            .catch(function (err) { mostrarError('El caso se creó, pero el PDF no se pudo archivar automáticamente: ' + (err.message || err)); });
        }
      }

      navegarA('caso-detalle', resultado.caso.ID_Caso);
    }).catch(mostrarError);
  }
</script>

  <!-- ── JavaScript_CasoDetalle.html ── -->
  <script>
  function cargarCasoDetalle(idCaso) {
    elTopbarTitulo('Caso ' + idCaso);
    elContenido().innerHTML = '<div class="vacio">Cargando caso…</div>';
    state.tabCasoActual = 'datos';

    llamar('obtenerCaso', idCaso).then(function (data) {
      state.casoActual = data;
      renderCasoDetalle();
    }).catch(mostrarError);
  }

  function renderCasoDetalle() {
    var d = state.casoActual;
    var c = d.caso;

    var pctDocs = calcularPctDocumentos_(d.documentos);

    var html = '<div class="tarjeta" style="margin-bottom:18px; display:flex; justify-content:space-between; align-items:center;">' +
      '<div>' +
        '<h1 style="margin-bottom:6px;">' + escapeHtml(c.Nombre_Trabajador) + ' <span class="mono" style="font-size:14px; color:var(--texto-tenue);">· ' + escapeHtml(c.ID_Caso) + '</span></h1>' +
        '<div style="display:flex; gap:8px; align-items:center;">' + pillEstadoCaso(c.Estado_Caso) + pillGravedad(c.Gravedad) +
          '<span style="font-size:12.5px; color:var(--texto-secundario);">' + escapeHtml(c.Cliente || '') + ' · ' + escapeHtml(c.Fecha_Siniestro || '') + '</span>' +
        '</div>' +
      '</div>' +
      '<div style="display:flex; gap:8px;">' +
        (c.URL_Carpeta_Drive ? '<a class="btn btn-secundario" href="' + c.URL_Carpeta_Drive + '" target="_blank">Abrir carpeta en Drive</a>' : '') +
        botonesEstadoCaso_(c) +
      '</div>' +
    '</div>';

    html += '<div class="tabs">' +
      tabBtn_('datos', 'Datos generales') +
      tabBtn_('medidas', 'Medidas correctivas (' + d.medidas.length + ')') +
      tabBtn_('documentos', 'Documentos (' + pctDocs.cargados + '/' + pctDocs.total + ')') +
      tabBtn_('historial', 'Historial') +
    '</div>';

    html += '<div id="tab-contenido"></div>';

    elContenido().innerHTML = html;
    renderTabActual();
  }

  function tabBtn_(id, label) {
    return '<div class="tab' + (state.tabCasoActual === id ? ' activo' : '') + '" onclick="cambiarTabCaso(\'' + id + '\', this)">' + label + '</div>';
  }

  function cambiarTabCaso(id, el) {
    state.tabCasoActual = id;
    document.querySelectorAll('.tab').forEach(function (t) { t.classList.remove('activo'); });
    el.classList.add('activo');
    renderTabActual();
  }

  function renderTabActual() {
    var cont = document.getElementById('tab-contenido');
    if (state.tabCasoActual === 'datos') cont.innerHTML = renderTabDatos_();
    else if (state.tabCasoActual === 'medidas') renderTabMedidas();
    else if (state.tabCasoActual === 'documentos') renderTabDocumentos();
    else if (state.tabCasoActual === 'historial') cont.innerHTML = renderTabHistorial_();
  }

  function botonesEstadoCaso_(c) {
    if (!puede('cerrar_caso')) return '';
    if (c.Estado_Caso === 'cerrado') {
      return '<button class="btn btn-secundario" onclick="accionCaso(\'reabrirCaso\')">Reabrir caso</button>';
    }
    return '<button class="btn btn-primario" onclick="accionCaso(\'cerrarCaso\')">Cerrar caso</button>';
  }

  function accionCaso(nombreFuncion) {
    confirmarAccion(nombreFuncion === 'cerrarCaso' ? '¿Cerrar este caso?' : '¿Reabrir este caso?').then(function (ok) {
      if (!ok) return;
      llamar(nombreFuncion, state.casoActual.caso.ID_Caso).then(function (data) {
        state.casoActual = data;
        mostrarToast('Caso actualizado.', 'exito');
        renderCasoDetalle();
      }).catch(mostrarError);
    });
  }

  function calcularPctDocumentos_(documentos) {
    var relevantes = documentos.filter(function (d) { return d.Estado !== 'no_aplica'; });
    var cargados = relevantes.filter(function (d) { return d.Estado === 'cargado'; }).length;
    return { cargados: cargados, total: relevantes.length };
  }

  // ── Tab: Datos generales ────────────────────────────────────────────

  function renderTabDatos_() {
    var c = state.casoActual.caso;
    var filas = [
      ['Dependencia', c.Dependencia], ['Nombre empresa', c.Nombre_Empresa], ['Cliente', c.Cliente],
      ['Proyecto', c.Proyecto], ['Tipo de servicio', c.Tipo_Servicio],
      ['RUT trabajador', c.RUT_Trabajador], ['Cargo', c.Cargo], ['Región', c.Region],
      ['Fecha contrato', c.Fecha_Contrato], ['Edad', c.Edad], ['Legalidad', c.Legalidad], ['Supervisor a cargo', c.Supervisor_A_Cargo],
      ['Tipo de siniestro', c.Tipo_Siniestro], ['Calificación', c.Calificacion],
      ['Fecha siniestro', c.Fecha_Siniestro], ['Hora siniestro', c.Hora_Siniestro],
      ['Dirección', c.Direccion], ['Comuna', c.Comuna], ['Ciudad', c.Ciudad],
      ['Hora ingreso turno', c.Hora_Ingreso_Turno], ['Horas trabajadas al momento', c.Horas_Trabajo_Al_Momento],
      ['Días de reposo', c.Dias_Reposo], ['Fecha inicio reposo', c.Fecha_Inicio_Reposo],
      ['APR a cargo', c.APR_A_Cargo], ['Redacta', c.Nombre_Redacta], ['Revisa', c.Nombre_Revisa], ['Aprueba', c.Nombre_Aprueba],
      ['Versión de catálogo usada', c.Version_Catalogo_Usada], ['Registrado por', c.Registrado_Por]
    ];

    var html = '<div class="tarjeta"><div class="form-grid">' +
      filas.map(function (f) {
        return '<div class="campo"><label>' + f[0] + '</label><div>' + (escapeHtml(f[1]) || '—') + '</div></div>';
      }).join('') +
    '</div>';

    html += '<div class="seccion-titulo"><h3>Descripción del accidente</h3></div><p>' + (escapeHtml(c.Descripcion_Accidente) || '—') + '</p>';
    html += '<div class="seccion-titulo"><h3>Causa raíz</h3></div><p>' + (escapeHtml(c.Causa_Raiz) || '—') + '</p>';
    if (c.Observaciones) {
      html += '<div class="seccion-titulo"><h3>Observaciones</h3></div><p>' + escapeHtml(c.Observaciones) + '</p>';
    }
    html += '</div>';
    return html;
  }

  // ── Tab: Historial ───────────────────────────────────────────────────

  function renderTabHistorial_() {
    var h = state.casoActual.historial;
    if (h.length === 0) return '<div class="tarjeta vacio">Sin movimientos registrados aún.</div>';

    return '<div class="tarjeta" style="padding:0;"><table class="tabla"><thead><tr>' +
      '<th>Fecha</th><th>Usuario</th><th>Tipo</th><th>Acción</th><th>Detalle</th>' +
      '</tr></thead><tbody>' +
      h.map(function (r) {
        return '<tr style="cursor:default;">' +
          '<td class="mono" style="white-space:nowrap;">' + escapeHtml(r.Fecha_Hora) + '</td>' +
          '<td>' + escapeHtml(r.Usuario) + '</td>' +
          '<td><span class="pill pill-neutro">' + escapeHtml(r.Tipo_Referencia) + '</span></td>' +
          '<td>' + escapeHtml(r.Accion) + '</td>' +
          '<td style="color:var(--texto-secundario);">' + escapeHtml(r.Detalle) + '</td>' +
        '</tr>';
      }).join('') +
      '</tbody></table></div>';
  }
</script>

  <!-- ── JavaScript_Medidas.html ── -->
  <script>
  function renderTabMedidas() {
    var cont = document.getElementById('tab-contenido');
    var medidas = state.casoActual.medidas;

    var html = '<div style="display:flex; justify-content:flex-end; margin-bottom:12px;">' +
      (puede('crear_medida') ? '<button class="btn btn-primario" onclick="abrirModalMedida()">+ Nueva medida</button>' : '') +
    '</div>';

    if (medidas.length === 0) {
      html += '<div class="tarjeta vacio">Aún no hay medidas correctivas registradas para este caso.</div>';
      cont.innerHTML = html;
      return;
    }

    html += '<div class="tarjeta" style="padding:0;"><table class="tabla"><thead><tr>' +
      '<th>Descripción</th><th>Responsable</th><th>Compromiso</th><th>Estado</th><th></th>' +
      '</tr></thead><tbody>' +
      medidas.map(function (m) {
        return '<tr style="cursor:default;">' +
          '<td style="max-width:340px;">' + escapeHtml(m.Descripcion) + '</td>' +
          '<td>' + escapeHtml(m.Responsable) + '</td>' +
          '<td class="mono">' + escapeHtml(m.Fecha_Compromiso) + '</td>' +
          '<td>' + pillEstadoMedida(m.Estado_Calculado) + '</td>' +
          '<td>' + (puede('editar_medida') && m.Estado_Calculado !== 'cerrada' ? botonesEstadoMedida_(m) : '') + '</td>' +
        '</tr>';
      }).join('') +
      '</tbody></table></div>';

    cont.innerHTML = html;
  }

  function botonesEstadoMedida_(m) {
    var opciones = ['abierta', 'en_curso', 'cerrada'].filter(function (e) { return e !== m.Estado; });
    return '<select onchange="cambiarEstadoMedida(\'' + m.ID_Medida + '\', this.value)" style="font-size:12px; padding:4px 6px;">' +
      '<option value="">Cambiar a…</option>' +
      opciones.map(function (o) { return '<option value="' + o + '">' + etiquetaEstadoMedida_(o) + '</option>'; }).join('') +
      '</select>';
  }

  function etiquetaEstadoMedida_(e) {
    return { abierta: 'Abierta', en_curso: 'En curso', cerrada: 'Cerrada' }[e] || e;
  }

  function cambiarEstadoMedida(idMedida, nuevoEstado) {
    if (!nuevoEstado) return;
    llamar('actualizarMedida', idMedida, { Estado: nuevoEstado }).then(function (medidas) {
      state.casoActual.medidas = medidas;
      mostrarToast('Estado de la medida actualizado.', 'exito');
      renderTabMedidas();
    }).catch(mostrarError);
  }

  function abrirModalMedida() {
    var fondo = document.createElement('div');
    fondo.className = 'modal-fondo';
    fondo.innerHTML =
      '<div class="modal">' +
        '<h2>Nueva medida correctiva</h2>' +
        '<div class="campo" style="margin-bottom:10px;"><label>Descripción *</label><textarea id="m-descripcion"></textarea></div>' +
        '<div class="campo" style="margin-bottom:10px;"><label>Responsable</label><input type="text" id="m-responsable"></div>' +
        '<div class="campo" style="margin-bottom:10px;"><label>Fecha compromiso</label><input type="date" id="m-fecha"></div>' +
        '<div style="display:flex; gap:8px; justify-content:flex-end; margin-top:16px;">' +
          '<button class="btn btn-secundario" onclick="cerrarModal()">Cancelar</button>' +
          '<button class="btn btn-primario" onclick="guardarMedida(this)">Guardar</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(fondo);
  }

  function guardarMedida(boton) {
    var descripcion = document.getElementById('m-descripcion').value.trim();
    if (!descripcion) return mostrarError('La descripción de la medida es obligatoria.');

    var datos = {

  <!-- ── JavaScript_Documentos.html ── -->
  <script>
  var ETIQUETAS_CATEGORIA = {
    Antecedentes_Trabajador: 'Antecedentes del trabajador',
    Licencias_Medicas: 'Licencias médicas',
    DIAT_Empresa: 'DIAT empresa',
    DIAT_Trabajador: 'DIAT trabajador',
    Fotografias_Evidencia: 'Fotografías y evidencia',
    Investigacion: 'Investigación y medidas correctivas',
    Instrumentos_Prevencion: 'Instrumentos de prevención',
    EPP: 'Elementos de protección personal',
    Fiscalizacion_DT_Seremi: 'Fiscalización DT / SEREMI',
    Otros: 'Otros'
  };
  var ORDEN_CATEGORIAS = Object.keys(ETIQUETAS_CATEGORIA);

  function renderTabDocumentos() {
    var cont = document.getElementById('tab-contenido');
    var docs = state.casoActual.documentos;
    var pct = calcularPctDocumentos_(docs);
    var pctNum = pct.total > 0 ? Math.round((pct.cargados / pct.total) * 100) : 0;

    var html = '<div class="tarjeta" style="margin-bottom:16px;">' +
      '<div style="display:flex; justify-content:space-between; margin-bottom:8px;">' +
        '<strong>' + pct.cargados + ' de ' + pct.total + ' documentos cargados (' + pctNum + '%)</strong>' +
        (puede('subir_documento') ? '<button class="btn btn-texto" onclick="abrirModalDocumentoAdicional()">+ Agregar ítem no listado</button>' : '') +
      '</div>' +
      '<div class="barra-progreso"><div class="barra-progreso-relleno" style="width:' + pctNum + '%;"></div></div>' +
    '</div>';

    var porCategoria = {};
    docs.forEach(function (d) {
      (porCategoria[d.Categoria] = porCategoria[d.Categoria] || []).push(d);
    });

    ORDEN_CATEGORIAS.concat(Object.keys(porCategoria).filter(function (c) { return ORDEN_CATEGORIAS.indexOf(c) === -1; }))
      .forEach(function (cat) {
        var items = porCategoria[cat];
        if (!items || items.length === 0) return;
        html += '<div class="checklist-categoria">' +
          '<div class="checklist-categoria-header"><span>' + (ETIQUETAS_CATEGORIA[cat] || cat) + '</span>' +
          '<span class="mono" style="font-weight:400; text-transform:none;">' + items.filter(function (i) { return i.Estado === 'cargado'; }).length + '/' + items.length + '</span></div>' +
          items.map(renderItemChecklist_).join('') +
        '</div>';
      });

    cont.innerHTML = html;
  }

  function renderItemChecklist_(d) {
    var acciones = '';
    if (puede('subir_documento')) {
      acciones += '<button class="btn btn-secundario" style="padding:5px 10px; font-size:12px;" onclick="dispararCargaArchivo(\'' + d.ID_Registro + '\', false)">' +
        (d.Estado === 'cargado' ? 'Nueva versión' : 'Cargar') + '</button>';
    }
    if (d.Estado === 'cargado' && d.URL_Drive) {
      acciones += '<a class="btn btn-texto" style="padding:5px 6px; font-size:12px;" href="' + d.URL_Drive + '" target="_blank">Ver (v' + d.Version + ')</a>';
    }
    if (d.Estado === 'cargado' && puede('sobrescribir_documento')) {
      acciones += '<button class="btn btn-texto" style="padding:5px 6px; font-size:12px; color:var(--estado-critico);" onclick="dispararCargaArchivo(\'' + d.ID_Registro + '\', true)">Sobrescribir</button>';
    }
    if (d.Estado === 'pendiente' && puede('subir_documento')) {
      acciones += '<button class="btn btn-texto" style="padding:5px 6px; font-size:12px;" onclick="marcarDocNoAplica(\'' + d.ID_Registro + '\')">No aplica</button>';
    }

    return '<div class="checklist-item">' +
      pillEstadoDoc(d.Estado) +
      '<div class="ci-nombre">' + escapeHtml(d.Nombre_Documento) + (d.Es_Personalizado ? ' <span class="pill pill-neutro" style="font-size:10px;">agregado</span>' : '') +
        (d.Condicion_Adicional ? '<div class="ci-condicion">' + escapeHtml(d.Condicion_Adicional) + '</div>' : '') +
      '</div>' +
      '<div class="ci-acciones">' + acciones + '</div>' +
    '</div>';
  }

  function dispararCargaArchivo(idRegistro, sobrescribir) {
    var input = document.createElement('input');
    input.type = 'file';
    input.onchange = function () {
      var file = input.files[0];
      if (!file) return;

      var accionPromesa = sobrescribir
        ? confirmarAccion('Esto reemplazará el archivo cargado actualmente para este ítem. La versión anterior no quedará disponible dentro del sistema. ¿Continuar?')
        : Promise.resolve(true);

      accionPromesa.then(function (ok) {
        if (!ok) return;
        leerArchivoBase64(file).then(function (archivo) {
          mostrarToast('Subiendo archivo…');
          return llamar('subirDocumento', idRegistro, archivo.base64, archivo.mimeType, archivo.nombre, sobrescribir);
        }).then(function (documentos) {
          state.casoActual.documentos = documentos;
          mostrarToast(sobrescribir ? 'Archivo sobrescrito.' : 'Documento cargado.', 'exito');
          renderTabDocumentos();
        }).catch(mostrarError);
      });
    };
    input.click();
  }

  function marcarDocNoAplica(idRegistro) {
    confirmarAccion('¿Marcar este ítem como "no aplica" para este caso?').then(function (ok) {
      if (!ok) return;
      llamar('marcarNoAplica', idRegistro, '').then(function (documentos) {
        state.casoActual.documentos = documentos;
        mostrarToast('Ítem marcado como no aplica.', 'exito');
        renderTabDocumentos();
      }).catch(mostrarError);
    });
  }

  function abrirModalDocumentoAdicional() {
    var fondo = document.createElement('div');
    fondo.className = 'modal-fondo';
    fondo.innerHTML =
      '<div class="modal">' +
        '<h2>Agregar ítem no listado</h2>' +
        '<div class="campo" style="margin-bottom:10px;"><label>Nombre del documento *</label><input type="text" id="da-nombre"></div>' +
        '<div class="campo" style="margin-bottom:10px;"><label>Categoría / carpeta destino</label>' +
          '<select id="da-categoria">' +
            ORDEN_CATEGORIAS.map(function (c) { return '<option value="' + c + '">' + ETIQUETAS_CATEGORIA[c] + '</option>'; }).join('') +
          '</select></div>' +
        '<div style="display:flex; gap:8px; justify-content:flex-end; margin-top:16px;">' +
          '<button class="btn btn-secundario" onclick="cerrarModal()">Cancelar</button>' +
          '<button class="btn btn-primario" onclick="guardarDocumentoAdicional(this)">Agregar</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(fondo);
  }

  function guardarDocumentoAdicional(boton) {
    var nombre = document.getElementById('da-nombre').value.trim();
    if (!nombre) return mostrarError('El nombre del documento es obligatorio.');
    var categoria = document.getElementById('da-categoria').value;

    conSpinner(boton, llamar('agregarDocumentoAdicional', state.casoActual.caso.ID_Caso, nombre, categoria)).then(function (documentos) {
      state.casoActual.documentos = documentos;
      cerrarModal();
      mostrarToast('Ítem agregado al checklist.', 'exito');
      state.tabCasoActual = 'documentos';
      renderCasoDetalle(); // repinta encabezado (contador de documentos) + tab activo correcto
    }).catch(mostrarError);
  }
</script>

  <!-- ── JavaScript_Usuarios.html ── -->
  <script>
  function cargarUsuarios() {
    elTopbarTitulo('Usuarios');
    elContenido().innerHTML = '<div class="vacio">Cargando…</div>';
    llamar('listarUsuarios').then(function (usuarios) {
      state.usuarios = usuarios;
      renderUsuarios();
    }).catch(mostrarError);
  }

  function renderUsuarios() {
    var html = '<div style="display:flex; justify-content:flex-end; margin-bottom:12px;">' +
      '<button class="btn btn-primario" onclick="abrirModalUsuario()">+ Nuevo usuario</button>' +
    '</div>';

    html += '<div class="tarjeta" style="padding:0;"><table class="tabla"><thead><tr>' +
      '<th>Email</th><th>Nombre</th><th>Rol</th><th>Estado</th><th></th>' +
      '</tr></thead><tbody>' +
      state.usuarios.map(function (u) {
        var activo = u.Activo === true || u.Activo === 'sí' || u.Activo === 'TRUE';
        return '<tr style="cursor:default;">' +
          '<td>' + escapeHtml(u.Email) + '</td>' +
          '<td>' + escapeHtml(u.Nombre) + '</td>' +
          '<td><span class="pill pill-info">' + escapeHtml(String(u.Rol).replace('_', ' ')) + '</span></td>' +
          '<td>' + (activo ? '<span class="pill pill-ok">Activo</span>' : '<span class="pill pill-neutro">Inactivo</span>') + '</td>' +
          '<td style="display:flex; gap:6px;">' +
            '<button class="btn btn-texto" style="font-size:12px;" onclick="abrirModalUsuario(\'' + u.Email + '\')">Editar</button>' +
            (activo ? '<button class="btn btn-texto" style="font-size:12px; color:var(--estado-critico);" onclick="desactivarUsuarioUI(\'' + u.Email + '\')">Desactivar</button>' : '') +
          '</td>' +
        '</tr>';
      }).join('') +
      '</tbody></table></div>';

    elContenido().innerHTML = html;
  }

  function abrirModalUsuario(email) {
    var u = email ? state.usuarios.filter(function (x) { return x.Email === email; })[0] : null;
    var fondo = document.createElement('div');
    fondo.className = 'modal-fondo';
    fondo.innerHTML =
      '<div class="modal">' +
        '<h2>' + (u ? 'Editar usuario' : 'Nuevo usuario') + '</h2>' +
        '<div class="campo" style="margin-bottom:10px;"><label>Email (cuenta Google) *</label>' +
          '<input type="email" id="u-email" value="' + (u ? escapeHtml(u.Email) : '') + '"' + (u ? ' disabled' : '') + '></div>' +
        '<div class="campo" style="margin-bottom:10px;"><label>Nombre</label><input type="text" id="u-nombre" value="' + (u ? escapeHtml(u.Nombre) : '') + '"></div>' +
        '<div class="campo" style="margin-bottom:10px;"><label>Rol</label>' +
          '<select id="u-rol">' +
            ['administrador', 'apr', 'supervisor', 'solo_lectura'].map(function (r) {
              return '<option value="' + r + '"' + (u && u.Rol === r ? ' selected' : '') + '>' + r.replace('_', ' ') + '</option>';
            }).join('') +
          '</select></div>' +
        '<div class="campo" style="margin-bottom:10px;"><label><input type="checkbox" id="u-activo" ' +
          (!u || u.Activo === true || u.Activo === 'sí' || u.Activo === 'TRUE' ? 'checked' : '') + ' style="width:auto; display:inline-block; margin-right:6px;">Usuario activo</label></div>' +
        '<div style="display:flex; gap:8px; justify-content:flex-end; margin-top:16px;">' +
          '<button class="btn btn-secundario" onclick="cerrarModal()">Cancelar</button>' +
          '<button class="btn btn-primario" onclick="guardarUsuarioUI(this)">Guardar</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(fondo);
  }

  function guardarUsuarioUI(boton) {
    var email = document.getElementById('u-email').value.trim();
    if (!email) return mostrarError('El email es obligatorio.');

    var datos = {
      Email: email,
      Nombre: document.getElementById('u-nombre').value.trim(),
      Rol: document.getElementById('u-rol').value,
      Activo: document.getElementById('u-activo').checked
    };

    conSpinner(boton, llamar('guardarUsuario', datos)).then(function (usuarios) {
      state.usuarios = usuarios;
      cerrarModal();
      mostrarToast('Usuario guardado.', 'exito');
      renderUsuarios();
    }).catch(mostrarError);
  }

  function desactivarUsuarioUI(email) {
    confirmarAccion('¿Desactivar a ' + email + '? Podrás reactivarlo después editándolo.').then(function (ok) {
      if (!ok) return;
      llamar('desactivarUsuario', email).then(function (usuarios) {
        state.usuarios = usuarios;
        mostrarToast('Usuario desactivado.', 'exito');
        renderUsuarios();
      }).catch(mostrarError);
    });
  }
</script>

============================================================================
GUIA_CONFIGURACION — léela una vez, antes de abrir este archivo por primera vez
============================================================================

Este sistema necesita 3 cosas de una sola vez, todas gratuitas dentro de
Google Workspace / una cuenta Google normal:

1) UN PROYECTO EN GOOGLE CLOUD CON DOS APIs HABILITADAS
   - Ve a https://console.cloud.google.com/
   - Crea un proyecto nuevo (o usa uno existente).
   - Menú → APIs y servicios → Biblioteca → busca y habilita:
       • Google Sheets API
       • Google Drive API

2) UN CLIENT ID DE OAuth 2.0
   - En el mismo proyecto: APIs y servicios → Pantalla de consentimiento OAuth.
     - Tipo de usuario: "Interno" si tienes Google Workspace (recomendado),
       o "Externo" + agregarte a ti mismo como "usuario de prueba" si usas
       una cuenta @gmail.com normal.
     - Completa nombre de la app, correo de soporte, y guarda.
   - Luego: APIs y servicios → Credenciales → Crear credenciales →
     ID de cliente de OAuth → Tipo de aplicación: "Aplicación web".
   - En "Orígenes de JavaScript autorizados" agrega la URL exacta donde
     vas a alojar este archivo (ver punto 3). Ejemplos:
       • https://tu-usuario.github.io
       • http://localhost:8000  (si lo pruebas localmente con un servidor)
   - Copia el "Client ID" resultante (termina en .apps.googleusercontent.com)
     y pégalo en CONFIG.CLIENT_ID al inicio de este archivo.

   IMPORTANTE: el login de Google NO funciona abriendo el archivo con
   doble clic (protocolo file://) — necesita un origen http/https real.
   Por eso el punto 3 es obligatorio, no opcional.

3) ALOJAR ESTE ARCHIVO EN ALGÚN LUGAR CON URL PROPIA
   La opción más simple y gratuita, igual a como tienes SST Sentinel:
   - Crea un repositorio en GitHub (puede ser privado si tu plan lo permite,
     o público si el contenido no es sensible — recuerda que igual toda
     la DATA vive en tu Sheet/Drive privado, este HTML es solo la interfaz).
   - Sube este archivo (puedes llamarlo index.html).
   - Activa GitHub Pages: Settings → Pages → Deploy from branch → main.
   - La URL que te entregue GitHub Pages es la que compartes con tu equipo,
     y es la misma que debes registrar en el paso 2 como origen autorizado.

4) LA PRIMERA VEZ QUE LO ABRES
   - Verás "Conectar con Google" → inicia sesión con la cuenta que va a ser
     dueña de la planilla y la carpeta (puede ser tu cuenta, o una cuenta
     dedicada del equipo, como hiciste con siniestroszener@gmail.com en
     SST Sentinel).
   - Como CONFIG.SPREADSHEET_ID y CONFIG.ROOT_FOLDER_ID están vacíos, verás
     la pantalla "Configuración inicial" — un clic crea las 7 hojas, siembra
     el catálogo de 43 documentos, y crea la carpeta raíz en Drive.
   - Copia los dos IDs que te muestra, pégalos en CONFIG al inicio de este
     archivo, guarda, y vuelve a subirlo a donde lo estés alojando (paso 3).
   - Desde ese momento, todos los que abran esa misma URL comparten los
     mismos datos en vivo — no hay nada guardado por separado en cada PC.

SOBRE LOS ROLES Y LA SEGURIDAD (léelo, es importante)
   Como todos entran con la MISMA cuenta de Google (o cuentas con acceso a
   la misma planilla/carpeta), el sistema pide "¿Quién eres?" la primera
   vez en cada equipo y lo recuerda ahí. Esa identificación NO está
   protegida por contraseña — es igual de confiable que el resto de tus
   herramientas internas: sirve para dejar registro de quién hizo qué
   (auditoría) y para mostrar/ocultar botones según el rol, pero cualquier
   persona con acceso a la cuenta de Google podría, en teoría, elegirse
   a sí misma como "administrador". El límite de seguridad real es quién
   tiene la contraseña de la cuenta de Google que da acceso a la planilla
   y la carpeta — igual que en SST Sentinel.

SOBRE EL OCR
   Usa la conversión nativa de Drive (subir el PDF pidiendo que se
   convierta a Google Doc con OCR activado) — no hay IA de por medio, es
   reconocimiento óptico de caracteres estándar de Google. Busca los
   rótulos fijos del formato ZN-FT-SST-050 línea por línea. Cálibralo con
   2-3 PDFs reales antes de confiar en él a ciegas — el formulario siempre
